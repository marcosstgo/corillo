<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;background:#060608;font-family:'Bebas Neue',cursive}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c84a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8c84a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#df3030" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#df3030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

  <!-- Glow behind logo -->
  <ellipse cx="220" cy="280" rx="300" ry="200" fill="url(#glow)"/>
  <ellipse cx="220" cy="280" rx="200" ry="140" fill="url(#redglow)"/>

  <!-- LOGO — large -->
  <!-- C -->
  <text x="60" y="370" font-family="Bebas Neue, cursive" font-size="280" fill="#f2efe9">C</text>
  <!-- O broadcast -->
  <circle cx="268" cy="230" r="110" fill="url(#glow)"/>
  <circle cx="268" cy="230" r="108" stroke="#f2efe9" stroke-width="22" fill="none"/>
  <circle cx="268" cy="230" r="64" stroke="#e8c84a" stroke-width="16" fill="none"/>
  <circle cx="268" cy="230" r="26" fill="#e8c84a"/>
  <circle cx="268" cy="230" r="11" fill="#df3030"/>
  <!-- RILLO -->
  <text x="388" y="370" font-family="Bebas Neue, cursive" font-size="280" fill="#f2efe9">RILLO</text>

  <!-- Divider -->
  <line x1="60" y1="410" x2="700" y2="410" stroke="rgba(232,200,74,.2)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="62" y="460" font-family="Space Mono, monospace" font-size="22" fill="rgba(255,255,255,.45)" letter-spacing="4">STREAM PLATFORM · PUERTO RICO</text>

  <!-- Live pill -->
  <rect x="62" y="490" width="120" height="36" rx="18" fill="rgba(223,48,48,.12)" stroke="rgba(223,48,48,.3)" stroke-width="1"/>
  <circle cx="86" cy="508" r="5" fill="#df3030"/>
  <text x="98" y="514" font-family="Space Mono, monospace" font-size="11" fill="#df3030" letter-spacing="2">EN VIVO</text>

  <!-- URL -->
  <text x="1138" y="600" font-family="Space Mono, monospace" font-size="18" fill="rgba(255,255,255,.2)" letter-spacing="2" text-anchor="end">CORILLO.LIVE</text>
</svg>
</body>
</html>
