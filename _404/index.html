<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>CORILLO — 404</title>
  <meta name="description" content="La página que buscas no existe en Corillo." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://corillo.live/_404/" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <meta name="theme-color" content="#060608">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/corillo.css">
  <style>
    .nf-shell{min-height:100dvh;display:grid;place-items:center;padding:32px 16px;background:radial-gradient(circle at top,#0d1a22 0%,#060608 52%)}
    .nf-card{width:min(100%,720px);padding:40px 28px;text-align:center}
    .nf-face{font-family:"Bebas Neue",cursive;font-size:clamp(4rem,12vw,7rem);line-height:1;color:var(--crl-white);margin:0 0 8px}
    .nf-code{display:inline-flex;align-items:center;gap:10px;margin:0 0 12px;padding:8px 14px;border-radius:999px;background:rgba(0,191,255,.12);border:1px solid rgba(0,191,255,.25);color:#8adfff;font:700 12px/1 "DM Sans",sans-serif;letter-spacing:.12em;text-transform:uppercase}
    .nf-title{margin:0 0 10px;font-family:"Bebas Neue",cursive;font-size:clamp(2.2rem,7vw,4rem);line-height:.95;color:var(--crl-white)}
    .nf-copy{margin:0 auto 22px;max-width:48ch;color:var(--crl-muted);font-size:1.02rem}
    .nf-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    [data-theme="light"] .nf-shell{background:radial-gradient(circle at top,#dff6ff 0%,#f7fbfd 58%)}
    [data-theme="light"] .nf-face,[data-theme="light"] .nf-title{color:#0c1a20}
    [data-theme="light"] .nf-copy{color:#48606a}
  </style>
</head>
<body class="crl-body">
  <main class="nf-shell">
    <section class="crl-card nf-card">
      <p class="nf-face">:(</p>
      <div class="nf-code">Error 404</div>
      <h1 class="nf-title">Esto no existe</h1>
      <p class="nf-copy">La ruta que intentaste abrir no corresponde a una página ni a un canal válido dentro de Corillo.</p>
      <div class="nf-actions">
        <a class="btn primary" href="/">Ir al inicio</a>
        <a class="btn" href="/streamers/">Ver streamers</a>
      </div>
    </section>
  </main>
</body>
</html>
