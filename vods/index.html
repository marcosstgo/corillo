<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>VODs — CORILLO</title>
  <meta name="description" content="Transmisiones pasadas de los streamers de CORILLO — plataforma independiente desde Puerto Rico." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <meta name="theme-color" content="#030a0e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="/assets/streamers.js"></script>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    body { min-height: 100vh; }

    /* ── NAV ── */
    nav { position: sticky; top: 0; z-index: 100; height: 52px; display: flex; align-items: center; padding: 0 32px; background: rgba(3,10,14,.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); gap: 20px; }
    .nav-logo svg { height: 34px; width: auto; }
    .nav-spacer { flex: 1; }
    .nav-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: rgba(232,246,255,.4); cursor: pointer; transition: .15s; text-decoration: none; }
    .nav-btn:hover { border-color: var(--border-h); color: var(--white); }
    .nav-btn.active { color: var(--accent); border-color: rgba(0,191,255,.3); }
    @media(max-width:600px) { nav { padding: 0 16px; gap: 12px; } }

    /* ── HERO ── */
    .hero { padding: 56px 32px 40px; max-width: 1200px; margin: 0 auto; }
    .hero-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .hero-label::before { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }
    .hero h1 { font-family: var(--display); font-size: clamp(3rem, 7vw, 6rem); letter-spacing: 4px; line-height: .9; color: var(--white); margin-bottom: 16px; }
    .hero h1 span { color: var(--accent); }
    .hero-sub { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    @media(max-width:600px) { .hero { padding: 40px 16px 28px; } }

    /* ── FILTERS ── */
    .filters { padding: 0 32px 28px; max-width: 1200px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-pill { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: .15s; }
    .filter-pill:hover { border-color: var(--border-h); color: var(--white); }
    .filter-pill.active { background: var(--accent); color: #030a0e; border-color: transparent; font-weight: 700; }
    @media(max-width:600px) { .filters { padding: 0 16px 20px; } }

    /* ── GRID ── */
    .section { padding: 0 32px 64px; max-width: 1200px; margin: 0 auto; }
    .vod-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media(max-width:1000px) { .vod-grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:600px) { .section { padding: 0 16px 48px; } .vod-grid { grid-template-columns: 1fr; gap: 12px; } }

    /* ── VOD CARD ── */
    .vod-card { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: transform .18s, border-color .18s, box-shadow .18s; }
    .vod-card:hover { transform: translateY(-3px); border-color: rgba(0,191,255,.25); box-shadow: 0 16px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(0,191,255,.06); }
    .vod-thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; }
    .vod-thumb-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .vod-thumb-letter { font-family: var(--display); font-size: 5rem; letter-spacing: 4px; opacity: .12; }
    .vod-thumb-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,191,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,191,255,.03) 1px, transparent 1px); background-size: 32px 32px; }
    .vod-play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; background: rgba(3,10,14,.4); }
    .vod-card:hover .vod-play-btn { opacity: 1; }
    .vod-play-icon { width: 52px; height: 52px; border-radius: 50%; background: rgba(0,191,255,.15); border: 1px solid rgba(0,191,255,.4); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 1.1rem; backdrop-filter: blur(8px); transition: transform .15s; }
    .vod-card:hover .vod-play-icon { transform: scale(1.08); }
    .vod-duration { position: absolute; bottom: 8px; right: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: .5px; background: rgba(3,10,14,.85); backdrop-filter: blur(6px); color: rgba(232,246,255,.85); padding: 3px 8px; border-radius: 4px; }
    .vod-body { padding: 12px 14px 14px; }
    .vod-channel-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .vod-ava { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 12px; color: #030a0e; }
    .vod-name { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .5px; }
    .vod-meta { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .5px; }
    .vod-meta i { font-size: .65rem; }

    /* ── EMPTY STATE ── */
    .empty { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; padding: 80px 24px; gap: 16px; border: 1px dashed var(--border); border-radius: 12px; color: var(--muted); text-align: center; }
    .empty-icon { width: 56px; height: 56px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 4px; }
    .empty h3 { font-family: var(--display); font-size: 1.8rem; letter-spacing: 3px; color: rgba(232,246,255,.2); }
    .empty p { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    /* ── MODAL ── */
    .modal-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(3,10,14,.92); backdrop-filter: blur(16px); display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 860px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,.7); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 12px; }
    .modal-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .modal-ava { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 13px; color: #030a0e; }
    .modal-name { font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-date { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .5px; flex-shrink: 0; }
    .modal-close { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .85rem; transition: .15s; flex-shrink: 0; }
    .modal-close:hover { border-color: var(--border-h); color: var(--white); }
    .modal-video { background: #000; aspect-ratio: 16/9; width: 100%; }
    .modal-video video { width: 100%; height: 100%; display: block; }
    .modal-footer { padding: 12px 18px; display: flex; align-items: center; gap: 16px; border-top: 1px solid var(--border); }
    .modal-stat { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .5px; display: flex; align-items: center; gap: 6px; }
    .modal-stat i { color: var(--accent); font-size: .65rem; }
    @media(max-width:600px) { .modal { border-radius: 12px 12px 0 0; } .modal-backdrop { align-items: flex-end; padding: 0; } }

    /* ── FOOTER ── */
    .site-footer{border-top:1px solid var(--border);padding:28px 32px;margin-top:16px}
    .foot-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .foot-left{display:flex;align-items:center;gap:12px}
    .foot-brand svg{height:28px;width:auto;opacity:.7}
    .foot-info{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.25);text-transform:uppercase;line-height:1.7}
    .foot-links{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:var(--muted);flex-wrap:wrap}
    .foot-links a{color:var(--muted);transition:.15s}
    .foot-links a:hover{color:var(--accent)}
    .foot-sep{color:rgba(255,255,255,.15)}
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 304 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="ng" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00bfff" stop-opacity="0.18"/><stop offset="100%" stop-color="#00bfff" stop-opacity="0"/></radialGradient></defs>
      <text x="0" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">C</text>
      <circle cx="72" cy="42" r="36" fill="url(#ng)"/>
      <circle cx="72" cy="42" r="34" stroke="#e8f6ff" stroke-width="9" fill="none"/>
      <circle cx="72" cy="42" r="20" stroke="#00bfff" stroke-width="6" fill="none"/>
      <circle cx="72" cy="42" r="8" fill="#00bfff"/>
      <circle cx="72" cy="42" r="3.5" fill="#00ff9d"/>
      <text x="114" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">RILLO</text>
    </svg>
  </a>
  <div class="nav-spacer"></div>
  <a href="/streamers/" class="nav-btn">Streamers</a>
  <a href="/" class="nav-btn"><i class="fa-solid fa-house"></i></a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-label">Archivo</div>
  <h1>TRANS<span>MISIONES</span></h1>
  <div class="hero-sub" id="heroSub">Cargando…</div>
</div>

<!-- FILTERS -->
<div class="filters" id="filters">
  <button class="filter-pill active" data-channel="all">Todos</button>
</div>

<!-- GRID -->
<div class="section">
  <div class="vod-grid" id="vodGrid">
    <!-- populated by JS -->
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-ava" id="modalAva"></div>
        <div class="modal-name" id="modalName"></div>
      </div>
      <div class="modal-date" id="modalDate"></div>
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-video">
      <video id="modalVideo" controls preload="metadata"></video>
    </div>
    <div class="modal-footer">
      <div class="modal-stat"><i class="fa-solid fa-clock"></i> <span id="modalDuration">—</span></div>
      <div class="modal-stat"><i class="fa-solid fa-weight-hanging"></i> <span id="modalSize">—</span></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="foot-inner">
    <div class="foot-left">
      <svg viewBox="0 0 304 88" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:28px;width:auto;opacity:.7">
        <defs><radialGradient id="fg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00bfff" stop-opacity="0.18"/><stop offset="100%" stop-color="#00bfff" stop-opacity="0"/></radialGradient></defs>
        <text x="0" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">C</text>
        <circle cx="72" cy="42" r="36" fill="url(#fg)"/>
        <circle cx="72" cy="42" r="34" stroke="#e8f6ff" stroke-width="9" fill="none"/>
        <circle cx="72" cy="42" r="20" stroke="#00bfff" stroke-width="6" fill="none"/>
        <circle cx="72" cy="42" r="8" fill="#00bfff"/>
        <circle cx="72" cy="42" r="3.5" fill="#00ff9d"/>
        <text x="114" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">RILLO</text>
      </svg>
      <div class="foot-info">Puerto Rico<br>Plataforma independiente</div>
    </div>
    <div class="foot-links">
      <a href="/multiplayer/">Multiplayer</a>
      <span class="foot-sep">·</span>
      <a href="/streamers/">Streamers</a>
      <span class="foot-sep">·</span>
      <a href="/join/">Crear Canal</a>
      <span class="foot-sep">·</span>
      <a href="/legal/">Términos</a>
      <span class="foot-sep">·</span>
      <a href="https://status.corillo.live" target="_blank" rel="noopener">Status</a>
    </div>
  </div>
</footer>

<script>
const PB = 'https://pb.corillo.live';

// ── Helpers ──────────────────────────────────────────────────────
function fmtDuration(s) {
  if (!s) return '—';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = Math.floor(s % 60);
  if (h > 0) return `${h}h ${m.toString().padStart(2,'0')}m`;
  return `${m}:${ss.toString().padStart(2,'0')}`;
}

function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes > 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
  return (bytes / 1048576).toFixed(0) + ' MB';
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-PR', { day: 'numeric', month: 'short', year: 'numeric' });
}

function streamerInfo(channel) {
  const s = (window.STREAMERS || []).find(x => x.key === channel);
  return s || { key: channel, name: channel.toUpperCase(), color: '#00bfff' };
}

function avaStyle(s) {
  return s.color ? `background:${s.color}` : 'background:var(--accent)';
}

function initial(name) {
  return (name || '?')[0].toUpperCase();
}

function vodUrl(vod) {
  return `/vods/${vod.channel}/${vod.filename}`;
}

// ── Fetch VODs ───────────────────────────────────────────────────
let allVods = [];
let activeFilter = 'all';

async function loadVods() {
  try {
    const r = await fetch(`${PB}/api/collections/vods/records?sort=-date&perPage=200`);
    const data = await r.json();
    allVods = data.items || [];
  } catch {
    allVods = [];
  }

  buildFilters();
  renderGrid();

  const heroSub = document.getElementById('heroSub');
  if (allVods.length === 0) {
    heroSub.textContent = 'Aún no hay transmisiones grabadas';
  } else {
    const channels = new Set(allVods.map(v => v.channel)).size;
    heroSub.textContent = `${allVods.length} transmisión${allVods.length !== 1 ? 'es' : ''} · ${channels} canal${channels !== 1 ? 'es' : ''}`;
  }
}

// ── Filters ──────────────────────────────────────────────────────
function buildFilters() {
  const channels = [...new Set(allVods.map(v => v.channel))];
  const container = document.getElementById('filters');
  // Keep "Todos" pill, add one per channel
  channels.forEach(ch => {
    const s = streamerInfo(ch);
    const btn = document.createElement('button');
    btn.className = 'filter-pill';
    btn.dataset.channel = ch;
    btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${s.color || 'var(--accent)'};margin-right:6px"></span>${s.name}`;
    btn.addEventListener('click', () => setFilter(ch));
    container.appendChild(btn);
  });

  container.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.channel));
  });
}

function setFilter(channel) {
  activeFilter = channel;
  document.querySelectorAll('.filter-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.channel === channel);
  });
  renderGrid();
}

// ── Render ───────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('vodGrid');
  const list = activeFilter === 'all' ? allVods : allVods.filter(v => v.channel === activeFilter);

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon"><i class="fa-solid fa-film"></i></div>
        <h3>SIN VODS</h3>
        <p>Aún no hay transmisiones grabadas${activeFilter !== 'all' ? ' para este canal' : ''}</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(vod => {
    const s = streamerInfo(vod.channel);
    const colorBg = s.color ? `${s.color}18` : 'rgba(0,191,255,.07)';
    return `
    <div class="vod-card" data-id="${vod.id}">
      <div class="vod-thumb" style="background:${colorBg}">
        <div class="vod-thumb-bg">
          <div class="vod-thumb-letter" style="color:${s.color || 'var(--accent)'}">${initial(s.name)}</div>
        </div>
        <div class="vod-thumb-grid"></div>
        <div class="vod-play-btn">
          <div class="vod-play-icon"><i class="fa-solid fa-play" style="margin-left:3px"></i></div>
        </div>
        <div class="vod-duration">${fmtDuration(vod.duration)}</div>
      </div>
      <div class="vod-body">
        <div class="vod-channel-row">
          <div class="vod-ava" style="${avaStyle(s)}">${initial(s.name)}</div>
          <div class="vod-name" style="color:${s.color || 'var(--white)'}">${s.name}</div>
        </div>
        <div class="vod-meta">
          <span><i class="fa-regular fa-calendar"></i> ${fmtDate(vod.date)}</span>
          <span><i class="fa-solid fa-weight-hanging"></i> ${fmtSize(vod.size)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.vod-card').forEach(card => {
    card.addEventListener('click', () => {
      const vod = allVods.find(v => v.id === card.dataset.id);
      if (vod) openModal(vod);
    });
  });
}

// ── Modal ────────────────────────────────────────────────────────
function openModal(vod) {
  const s = streamerInfo(vod.channel);
  document.getElementById('modalAva').style.cssText = avaStyle(s);
  document.getElementById('modalAva').textContent = initial(s.name);
  document.getElementById('modalName').textContent = s.name;
  document.getElementById('modalDate').textContent = fmtDate(vod.date);
  document.getElementById('modalDuration').textContent = fmtDuration(vod.duration);
  document.getElementById('modalSize').textContent = fmtSize(vod.size);

  const video = document.getElementById('modalVideo');
  video.src = vodUrl(vod);
  video.load();

  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  const video = document.getElementById('modalVideo');
  video.pause();
  video.src = '';
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ─────────────────────────────────────────────────────────
loadVods();
</script>
</body>
</html>
