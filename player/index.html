<script>
(async()=>{
  const seg=location.pathname.split('/').filter(Boolean);
  const ch=seg[0]||'';
  if(!ch)return;
  try{
    const r=await fetch(
      `https://pb.corillo.live/api/collections/vods/records?filter=channel%3D%22${ch}%22&sort=-date&perPage=5`,
      {signal:AbortSignal.timeout(6000)}
    );
    if(!r.ok)return;
    const {items=[]}=await r.json();
    if(!items.length)return;
    const allLink=document.getElementById('cvodsAll');
    if(allLink)allLink.href=`/vods/?ch=${ch}`;
    const list=document.getElementById('cvodsList');
    list.innerHTML=items.map(v=>{
      const s=v.duration||0;
      const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
      const dur=s?(h?h+'h ':'')+m+'m':'';
      const d=v.date?new Date(v.date).toLocaleDateString('es-PR',{month:'short',day:'numeric'}):'';
      const thumb=v.thumb?`<img src="${v.thumb}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:7px" onerror="this.style.display='none'" loading="lazy">`:'';
      const canHover=window.matchMedia('(hover: hover)').matches;
      const preview=v.preview&&canHover?`<video data-preview src="${v.preview}" muted playsinline preload="none" loop style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:7px;opacity:0;transition:opacity .3s;pointer-events:none"></video>`:'';
      return `<a class="cvod-card crl-player-vod-card" href="/vods/v/?id=${v.id}"><div class="cvod-thumb crl-player-vod-thumb" style="overflow:hidden">${thumb}${preview}<i class="fa-solid fa-play" style="position:relative;z-index:1"></i>${dur?`<span class="cvod-dur crl-player-vod-duration">${dur}</span>`:''}</div><div class="cvod-date crl-player-vod-date">${d}</div></a>`;
    }).join('');
    // Hover preview playback — desktop only (touch devices: tap = mouseenter + click, causes fullscreen)
    if(window.matchMedia('(hover: hover)').matches){
      list.querySelectorAll('.cvod-card').forEach(card=>{
        const vid=card.querySelector('[data-preview]');
        if(!vid)return;
        card.addEventListener('mouseenter',()=>{vid.style.opacity='1';vid.play().catch(()=>{})},{passive:true});
        card.addEventListener('mouseleave',()=>{vid.style.opacity='0';vid.pause();vid.currentTime=0},{passive:true});
      });
    }
    document.getElementById('channelVods').style.display='';
  }catch(e){}
})();
</script>
<script>
(async () => {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  const ch = location.pathname.split('/').filter(Boolean)[0] || '';
  if (!ch) return;

  function urlB64ToUint8Array(b64) {
    const pad = '='.repeat((4 - b64.length % 4) % 4);
    const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  let reg, vapidKey;
  try {
    reg = await navigator.serviceWorker.register('/sw.js');
    const r = await fetch('/chat-api/push-config');
    if (!r.ok) return;
    vapidKey = (await r.json()).public_key;
  } catch(e) { return; }
  if (!vapidKey) return;

  const btn = document.getElementById('notifyNavBtn');
  if (!btn) return;
  btn.style.display = '';

  async function refreshBtn() {
    const sub = await reg.pushManager.getSubscription();
    const active = !!sub;
    btn.innerHTML = active
      ? '<i class="fa-solid fa-bell"></i>'
      : '<i class="fa-regular fa-bell"></i>';
    btn.title = active ? 'Desactivar notificaciones' : 'Notificarme cuando esté en vivo';
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  }
  await refreshBtn();

  btn.addEventListener('click', async () => {
    try {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await sub.unsubscribe();
        await fetch('/chat-api/subscribe', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ channel: ch, endpoint: sub.endpoint }),
        });
      } else {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return;
        const newSub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(vapidKey),
        });
        await fetch('/chat-api/subscribe', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ channel: ch, subscription: newSub.toJSON() }),
        });
      }
    } catch(e) {}
    await refreshBtn();
  });
})();
</script>
