<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>CORILLO — ELBALA</title>
  <meta name="description" content="Stream en vivo de ELBALA en CORILLO — plataforma independiente desde Puerto Rico." />
  <!-- Open Graph / WhatsApp / Facebook / Discord -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://corillo.live/elbala/">
  <meta property="og:title" content="CORILLO — ELBALA">
  <meta property="og:description" content="Stream en vivo de ELBALA en CORILLO — plataforma independiente desde Puerto Rico.">
  <meta property="og:image" content="https://corillo.live/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="CORILLO — plataforma de streaming desde Puerto Rico">
  <meta property="og:locale" content="es_PR">
  <meta property="og:site_name" content="CORILLO">
  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CORILLO — ELBALA">
  <meta name="twitter:description" content="Stream en vivo de ELBALA en CORILLO — plataforma independiente desde Puerto Rico.">
  <meta name="twitter:image" content="https://corillo.live/assets/og-image.png">
  <meta name="twitter:image:alt" content="CORILLO — plataforma de streaming desde Puerto Rico">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <meta name="theme-color" content="#060608">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18"></script>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    :root{ --radius:12px; }
    [data-theme="light"] header{background:linear-gradient(to bottom,rgba(240,239,233,.97),rgba(240,239,233,.8))}
    [data-theme="light"] #navLogo text{fill:#12120f !important}
    [data-theme="light"] #navLogo circle[stroke="#f2efe9"]{stroke:#12120f !important}
    [data-theme="light"] .statsRow{background:rgba(240,239,233,.8)}
    [data-theme="light"] .stat-val{color:var(--white)}

    html{scroll-behavior:smooth}
    body{background:var(--ink);color:var(--white);font-family:var(--body);min-height:100vh;overflow-x:hidden}

    /* ── NAV ── */
    header{
      position:sticky;top:0;z-index:100;
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      background:linear-gradient(to bottom,rgba(6,6,8,.95),rgba(6,6,8,.6));
      border-bottom:1px solid var(--border);
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 18px;flex-wrap:wrap}
    .brand-link{display:flex;align-items:center;gap:10px;text-decoration:none}
    .brand-svg{width:110px;height:30px}
    .channel-tag{
      font-family:var(--mono);font-size:.55rem;letter-spacing:2px;text-transform:uppercase;
      color:var(--muted);border-left:1px solid var(--border);padding-left:10px;
    }
    .nav-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:6px;border:1px solid var(--border);
      background:transparent;color:rgba(255,255,255,.7);
      font-family:var(--mono);font-size:.55rem;letter-spacing:1px;text-transform:uppercase;
      cursor:pointer;transition:.18s ease;white-space:nowrap;
    }
    .btn:hover{border-color:var(--border-h);color:var(--white);background:rgba(255,255,255,.04)}
    .btn.active{border-color:rgba(232,200,74,.4);color:var(--accent);background:rgba(232,200,74,.06)}
    .btn.primary{background:var(--accent);color:var(--ink);border-color:transparent;font-weight:600}
    .btn.primary:hover{background:#d4b43c}
    .divider{width:1px;height:20px;background:var(--border);flex-shrink:0}

    /* ── PLAYER ── */
    .page{display:flex;flex-direction:column;min-height:calc(100vh - 51px)}
    .playerWrap{position:relative;background:#000;flex-shrink:0}
    #video{width:100%;display:block;background:#000;object-fit:contain}
    #video.horizontal{aspect-ratio:16/9}
    #video.vertical{aspect-ratio:9/16;max-height:80vh;margin:0 auto}

    /* Overlay */
    .overlay{
      position:absolute;inset:0;display:none;align-items:center;justify-content:center;
      background:rgba(0,0,0,.6);z-index:10;padding:18px;
    }
    .overlay.show{display:flex}
    .panel{
      border:1px solid rgba(255,255,255,.14);border-radius:14px;
      padding:20px;max-width:420px;width:100%;
      background:rgba(10,10,14,.7);backdrop-filter:blur(12px);
    }
    .panel h3{font-family:var(--mono);text-transform:uppercase;letter-spacing:2px;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:8px}
    .panel p{color:rgba(255,255,255,.75);font-size:.9rem;line-height:1.5}
    .panel .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    /* Overlay always dark — force white text/borders regardless of page theme */
    .panel .btn{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.15)}
    .panel .btn:hover{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.08)}
    .panel .btn.primary{background:var(--accent);color:#111;border-color:transparent}

    /* Controls bar */
    .ctrl-bar{
      position:absolute;left:0;right:0;bottom:0;z-index:12;
      display:flex;align-items:center;justify-content:space-between;gap:8px;padding:28px 12px 10px;
      background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
      opacity:0;transition:opacity .25s;pointer-events:none;
    }
    .ctrl-bar.visible{opacity:1;pointer-events:auto}
    .ctrl-left,.ctrl-right{display:flex;align-items:center;gap:6px}
    .ctrl-btn{
      width:30px;height:30px;background:none;border:none;
      color:rgba(255,255,255,.9);font-size:13px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      border-radius:4px;transition:color .15s,background .15s;flex-shrink:0;
    }
    .ctrl-btn:hover{color:#fff;background:rgba(255,255,255,.12)}
    .vol-slider{
      width:72px;height:3px;
      appearance:none;-webkit-appearance:none;
      background:rgba(255,255,255,.35);border-radius:2px;cursor:pointer;accent-color:#fff;
    }
    .pill{
      display:inline-flex;align-items:center;gap:5px;
      font-family:var(--mono);font-size:9px;letter-spacing:1px;
      padding:5px 8px;border-radius:999px;
      color:rgba(255,255,255,.7);background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.1);
    }
    .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .dot.on{background:var(--live);box-shadow:0 0 0 3px rgba(223,48,48,.2);animation:blink 1.4s infinite}

    /* Stats */
    .statsRow{
      display:flex;border-top:1px solid var(--border);
      background:rgba(12,12,16,.6);flex-shrink:0;
    }
    .stat{flex:1;padding:8px 12px;border-right:1px solid var(--border);text-align:center}
    .stat:last-child{border-right:none}
    .stat-val{font-family:var(--mono);font-size:.68rem;letter-spacing:1px;color:var(--white)}
    .stat-lbl{font-family:var(--mono);font-size:.44rem;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:2px}

    /* Themes */
    body.theme-terminal{background:#06080a}
    body.theme-terminal .playerWrap{border:1px solid rgba(232,200,74,.15)}
    body.theme-terminal .playerWrap::before{
      content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
      background:repeating-linear-gradient(to bottom,rgba(255,255,255,.04),rgba(255,255,255,.04) 1px,transparent 4px,transparent 7px);
    }
    body.theme-twitch{background:radial-gradient(800px 400px at 50% 0%,rgba(145,71,255,.14),transparent 55%),var(--ink)}

    /* Unmute banner */
    .unmute-btn{position:absolute;bottom:52px;left:14px;z-index:11;display:none;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer;transition:background .15s,border-color .15s}
    .unmute-btn.show{display:inline-flex}
    .unmute-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}

    /* Responsive */
    @media(max-width:600px){
      .topbar{padding:8px 12px}
      .channel-tag{display:none}
      .statsRow{display:grid;grid-template-columns:repeat(3,1fr)}
      .stat:nth-child(3n){border-right:none}
      .stat:nth-child(n+4){border-top:1px solid var(--border)}
      .nav-controls .divider,.nav-controls .btn:not(.primary):not(#chatToggleBtn){display:none}
    }

    /* ── CHAT ── */
    :root{ --border-h:rgba(255,255,255,.16); --chat-w:340px; }
    [data-theme="light"] .chat-col{background:var(--surface)}
    [data-theme="light"] .chat-header{background:var(--panel)}
    .content{display:grid;grid-template-columns:1fr var(--chat-w);min-height:calc(100vh - 51px)}
    .content.chat-hidden{grid-template-columns:1fr 0}
    .player-col{display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0}
    .chat-col{display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
    .content.chat-hidden .chat-col{width:0;overflow:hidden;border:none}
    .chat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0}
    .chat-title{font-family:var(--mono);font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
    .chat-toggle-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:.15s}
    .chat-toggle-btn:hover{border-color:var(--border-h);color:var(--white)}
    .chat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:3px;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
    .chat-msg{font-size:.8rem;line-height:1.45;word-break:break-word}
    .msg-user{font-family:var(--mono);font-size:.52rem;letter-spacing:.5px;font-weight:700;margin-right:6px}
    .chat-msg.is-bot .msg-user{color:#9147ff}
    .chat-msg.is-system{font-family:var(--mono);font-size:.48rem;letter-spacing:1px;color:rgba(255,255,255,.2);text-align:center;padding:3px 0}
    .chat-input-wrap{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;align-items:center}
    #chatInput{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--white);font-size:.82rem;font-family:var(--body);outline:none;transition:.15s;min-width:0}
    #chatInput:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06)}
    #chatInput::placeholder{color:rgba(255,255,255,.2)}
    #chatSend{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:.15s;flex-shrink:0}
    #chatSend:hover{border-color:var(--border-h);color:var(--white)}
    .chat-you{font-family:var(--mono);font-size:.48rem;letter-spacing:1px;color:rgba(255,255,255,.25)}
    @keyframes fabBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .chat-fab{position:fixed;bottom:24px;right:24px;z-index:90;display:none;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;background:var(--accent);color:var(--ink);border:none;cursor:pointer;font-family:var(--mono);font-size:.6rem;letter-spacing:1px;text-transform:uppercase;box-shadow:0 4px 16px rgba(232,200,74,.35);transition:background .2s,transform .2s}
    .chat-fab .fab-icon{font-size:1rem;animation:fabBounce 2s ease-in-out infinite}
    .chat-fab:hover{background:#d4b43c;transform:scale(1.04)}
    .chat-fab.visible{display:flex}
    @media(max-width:900px){
      .content{grid-template-columns:1fr;grid-template-rows:auto auto}
      .player-col{border-right:none;border-bottom:1px solid var(--border)}
      .chat-col{height:360px;border-top:1px solid var(--border)}
      .content.chat-hidden .chat-col{height:0}
      :root{--chat-w:100%}
    }
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand-link">
      <a href="/" style="display:flex;align-items:center">
        <svg id="navLogo" class="brand-svg" viewBox="0 0 304 88" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="navGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#e8c84a" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#e8c84a" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <text x="0" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#f2efe9">C</text>
          <circle cx="72" cy="42" r="36" fill="url(#navGlow)"/>
          <circle cx="72" cy="42" r="34" stroke="#f2efe9" stroke-width="9" fill="none"/>
          <circle cx="72" cy="42" r="20" stroke="#e8c84a" stroke-width="6" fill="none"/>
          <circle cx="72" cy="42" r="8" fill="#e8c84a"/>
          <circle cx="72" cy="42" r="3.5" fill="#df3030"/>
          <text x="114" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#f2efe9">RILLO</text>
        </svg>
      </a>
      <div class="channel-tag" id="chTag">— canal</div>
    </div>

    <div class="nav-controls">
      <span class="pill"><span class="dot" id="liveDot"></span>&nbsp;<span id="liveTxt">offline</span></span>

      <div class="divider"></div>

      <button class="btn" id="btnH" title="Horizontal 16:9"><i class="fa-solid fa-rectangle-wide"></i> 16:9</button>
      <button class="btn" id="btnV" title="Vertical 9:16"><i class="fa-solid fa-mobile-screen"></i> 9:16</button>

      <div class="divider"></div>

      <button class="btn" id="btnThemeOg">Original</button>
      <button class="btn" id="btnThemeTm"><i class="fa-solid fa-terminal"></i></button>
      <button class="btn" id="btnThemeTw"><i class="fa-brands fa-twitch"></i></button>

      <div class="divider"></div>

      <button class="theme-btn" id="themeBtn" title="Cambiar tema">☀</button>

      <a class="btn primary" id="twitchLink" href="#" target="_blank" rel="noopener">
        <i class="fa-brands fa-twitch"></i> Twitch
      </a>

      <button class="btn" id="chatToggleBtn" title="Mostrar/ocultar chat">
        <i class="fa-solid fa-comments"></i> Chat
      </button>

      <a class="btn" href="/"><i class="fa-solid fa-house"></i></a>
    </div>
  </div>
</header>

<div class="content" id="content">

  <!-- PLAYER COLUMN -->
  <div class="player-col">
    <div class="playerWrap">
      <video id="video" class="horizontal" playsinline muted></video>

      <!-- Overlay -->
      <div class="overlay" id="overlay">
        <div class="panel">
          <h3 id="ovTitle">Cargando</h3>
          <p id="ovMsg">Iniciando stream…</p>
          <div class="row">
            <button class="btn primary" id="ovRetry"><i class="fa-solid fa-play"></i> Reintentar</button>
          </div>
        </div>
      </div>

      <!-- Unmute banner -->
      <button id="unmuteBtn" class="unmute-btn"><i class="fa-solid fa-volume-xmark"></i> Activar sonido</button>

      <!-- Controls -->
      <div class="ctrl-bar" id="ctrlBar">
        <div class="ctrl-left">
          <button id="ctrlPlay" class="ctrl-btn" title="Play / Pausa"><i class="fa-solid fa-pause"></i></button>
          <button id="ctrlMute" class="ctrl-btn" title="Silenciar"><i class="fa-solid fa-volume-high"></i></button>
          <input id="ctrlVol" type="range" min="0" max="1" step="0.05" value="1" class="vol-slider">
          <span class="pill"><i class="fa-solid fa-tower-broadcast"></i>&nbsp;<span id="hlsTxt">—</span></span>
        </div>
        <div class="ctrl-right">
          <span class="pill"><i class="fa-solid fa-rotate"></i>&nbsp;<span id="retryTxt">0</span></span>
          <button id="ctrlFs" class="ctrl-btn" title="Pantalla completa"><i class="fa-solid fa-expand"></i></button>
        </div>
      </div>
    </div>

    <!-- Stream stats -->
    <div class="statsRow" id="statsRow">
      <div class="stat"><div class="stat-val" id="sBitrate">—</div><div class="stat-lbl">Bitrate</div></div>
      <div class="stat"><div class="stat-val" id="sBuffer">—</div><div class="stat-lbl">Buffer</div></div>
      <div class="stat"><div class="stat-val" id="sLatency">—</div><div class="stat-lbl">Latencia</div></div>
      <div class="stat"><div class="stat-val" id="sLevel">—</div><div class="stat-lbl">Calidad</div></div>
      <div class="stat"><div class="stat-val" id="sRetries">0</div><div class="stat-lbl">Reconexiones</div></div>
    </div>
  </div>

  <!-- CHAT COLUMN -->
  <div class="chat-col" id="chatCol">
    <div class="chat-header">
      <div class="chat-title">
        <span class="dot on" style="width:6px;height:6px"></span>
        <span>CHAT</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="chat-you" id="chatYou"></span>
        <button class="chat-toggle-btn" id="chatCloseBtn" title="Ocultar chat">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="Mensaje… (@bot para el bot)" maxlength="280" autocomplete="off">
      <button id="chatSend" title="Enviar"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

</div>

<button class="chat-fab" id="chatFab" title="Abrir chat">
  <i class="fa-solid fa-comments fab-icon"></i>
  <span>Chat en vivo</span>
</button>

<script>
const $ = (s, el=document) => el.querySelector(s);

// ── CHANNEL ──
const pathParts = location.pathname.replace(/^\/|\/$/g,'').split('/');
const channel   = (pathParts[0] || new URLSearchParams(location.search).get('ch') || 'katatonia').trim();

$('#chTag').textContent = '— ' + channel.toUpperCase();
document.title          = 'CORILLO — ' + channel.toUpperCase();

// Twitch username map — add handle here if different from channel key
const TWITCH_HANDLES = {};
const twitchUser = TWITCH_HANDLES[channel] || channel;
$('#twitchLink').href = 'https://twitch.tv/' + encodeURIComponent(twitchUser);

// ── MODE ──
const params = new URLSearchParams(location.search);
let mode = (params.get('mode') || 'horizontal').trim();

function setMode(m) {
  mode = m;
  $('#video').className = m;
  $('#btnH').classList.toggle('active', m === 'horizontal');
  $('#btnV').classList.toggle('active', m === 'vertical');
  history.replaceState(null,'', location.pathname + (m === 'horizontal' ? '' : '?mode=vertical'));
  start();
}
$('#btnH').addEventListener('click', () => setMode('horizontal'));
$('#btnV').addEventListener('click', () => setMode('vertical'));
$('#video').className = mode;
$('#btn' + (mode === 'vertical' ? 'V' : 'H')).classList.add('active');

// ── PLAYER THEME ──
function setTheme(name) {
  document.body.classList.remove('theme-terminal','theme-twitch');
  if (name !== 'original') document.body.classList.add('theme-' + name);
  localStorage.setItem('corillo_theme', name);
  $('#btnThemeOg').classList.toggle('active', name === 'original');
  $('#btnThemeTm').classList.toggle('active', name === 'terminal');
  $('#btnThemeTw').classList.toggle('active', name === 'twitch');
}
setTheme(localStorage.getItem('corillo_theme') || 'original');
$('#btnThemeOg').addEventListener('click', () => setTheme('original'));
$('#btnThemeTm').addEventListener('click', () => setTheme('terminal'));
$('#btnThemeTw').addEventListener('click', () => setTheme('twitch'));

// ── OVERLAY ──
function showOverlay(title, msg) {
  hideUnmuteBanner();
  $('#ovTitle').textContent = title;
  $('#ovMsg').textContent   = msg;
  $('#overlay').classList.add('show');
}
function hideOverlay() { $('#overlay').classList.remove('show'); }

// ── UNMUTE ──
function showUnmuteBanner() { if ($('#video').muted) $('#unmuteBtn').classList.add('show'); }
function hideUnmuteBanner() { $('#unmuteBtn').classList.remove('show'); }
$('#unmuteBtn').addEventListener('click', () => {
  const v = $('#video');
  v.muted = false; v.volume = 1;
  hideUnmuteBanner();
});

// ── CONTROLS BAR ──
let ctrlTimer = null;
const ctrlBar = document.getElementById('ctrlBar');
const playerWrap = document.querySelector('.playerWrap');
function showCtrl() {
  ctrlBar.classList.add('visible');
  clearTimeout(ctrlTimer);
  ctrlTimer = setTimeout(() => ctrlBar.classList.remove('visible'), 3000);
}
playerWrap.addEventListener('mousemove', showCtrl);
playerWrap.addEventListener('mouseleave', () => { clearTimeout(ctrlTimer); ctrlBar.classList.remove('visible'); });
playerWrap.addEventListener('touchstart', showCtrl, { passive: true });

// Play / Pause
const ctrlPlay = document.getElementById('ctrlPlay');
ctrlPlay.addEventListener('click', () => {
  const v = $('#video');
  if (v.paused) v.play().catch(() => {}); else v.pause();
});
$('#video').addEventListener('play',  () => { ctrlPlay.querySelector('i').className = 'fa-solid fa-pause'; });
$('#video').addEventListener('pause', () => { ctrlPlay.querySelector('i').className = 'fa-solid fa-play'; });

// Mute / Volume
const ctrlMute = document.getElementById('ctrlMute');
const ctrlVol  = document.getElementById('ctrlVol');
(function(){ const s = parseFloat(localStorage.getItem('corillo_volume')); if (!isNaN(s)) { $('#video').volume = s; ctrlVol.value = s; } })();
function syncVol() {
  const v = $('#video');
  ctrlVol.value = v.muted ? 0 : v.volume;
  ctrlMute.querySelector('i').className = 'fa-solid ' +
    ((v.muted || v.volume === 0) ? 'fa-volume-xmark' : v.volume < 0.5 ? 'fa-volume-low' : 'fa-volume-high');
}
ctrlMute.addEventListener('click', () => {
  const v = $('#video');
  v.muted = !v.muted;
  if (!v.muted && v.volume === 0) v.volume = 1;
  syncVol();
});
ctrlVol.addEventListener('input', () => {
  const v = $('#video');
  v.volume = +ctrlVol.value;
  v.muted = v.volume === 0;
  localStorage.setItem('corillo_volume', v.volume);
  syncVol();
});
$('#video').addEventListener('volumechange', () => { syncVol(); if (!$('#video').muted) hideUnmuteBanner(); });

// Fullscreen
const ctrlFs = document.getElementById('ctrlFs');
function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function updateFsIcon() { ctrlFs.querySelector('i').className = isFullscreen() ? 'fa-solid fa-compress' : 'fa-solid fa-expand'; }
ctrlFs.addEventListener('click', () => {
  const v = $('#video');
  if (isFullscreen()) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(() => {});
  } else if (v.requestFullscreen) {
    v.requestFullscreen().catch(() => {});
  } else if (v.webkitRequestFullscreen) {
    v.webkitRequestFullscreen();
  } else if (v.webkitEnterFullscreen) {
    v.webkitEnterFullscreen();
  }
});
document.addEventListener('fullscreenchange', updateFsIcon);
document.addEventListener('webkitfullscreenchange', updateFsIcon);
$('#video').addEventListener('webkitbeginfullscreen', () => { ctrlFs.querySelector('i').className = 'fa-solid fa-compress'; });
$('#video').addEventListener('webkitendfullscreen',   () => { ctrlFs.querySelector('i').className = 'fa-solid fa-expand'; });

// ── STATS ──
let statsTimer = null;
function startStatsPolling() {
  if (statsTimer) return;
  let hooked = false, emaBitrate = null;
  function fmtMbps(bps) {
    if (!bps || !isFinite(bps) || bps <= 0) return '—';
    return (bps / 1_000_000).toFixed(1) + ' Mbps';
  }
  function hookHls() {
    if (hooked) return;
    const h = window._hlsInstance;
    if (!h) return;
    hooked = true;
    h.on(Hls.Events.FRAG_LOADED, (_, data) => {
      try {
        const bytes = data?.stats?.loaded || 0;
        const dur   = data?.frag?.duration || 0;
        if (bytes > 0 && dur > 0) {
          const bps = (bytes * 8) / dur;
          emaBitrate = emaBitrate == null ? bps : emaBitrate * .75 + bps * .25;
        }
      } catch {}
    });
  }
  statsTimer = setInterval(() => {
    const v = $('#video');
    if (!v) return;
    hookHls();
    if (v.readyState >= 2 && v.buffered.length) {
      const buf = v.buffered.end(v.buffered.length - 1) - v.currentTime;
      $('#sBuffer').textContent = isFinite(buf) ? buf.toFixed(1) + 's' : '—';
    }
    if (v.seekable?.length > 0) {
      const lat = v.seekable.end(v.seekable.length - 1) - v.currentTime;
      $('#sLatency').textContent = (isFinite(lat) && lat >= 0) ? lat.toFixed(1) + 's' : '—';
    }
    const w = v.videoWidth, h = v.videoHeight;
    $('#sLevel').textContent   = (w > 0 && h > 0) ? `${w}×${h}` : '—';
    $('#sBitrate').textContent = fmtMbps(emaBitrate);
  }, 1000);
}
function stopStatsPolling() {
  clearInterval(statsTimer); statsTimer = null;
  ['sBitrate','sBuffer','sLatency','sLevel'].forEach(id => $('#'+id).textContent = '—');
}

// ── PLAYER ──
let hls = null, retries = 0, retryTimer = null;
window._hlsInstance = null;

function setLive(on) {
  $('#liveDot').className   = 'dot' + (on ? ' on' : '');
  $('#liveTxt').textContent = on ? 'en vivo' : 'offline';
}

function cleanup() {
  if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
  stopStatsPolling();
  const v = $('#video');
  try { v.pause(); } catch {}
  v.removeAttribute('src'); v.load();
  if (hls) { try { hls.destroy(); } catch {} hls = null; window._hlsInstance = null; }
  setLive(false);
}

function scheduleRetry(reason) {
  retries++;
  $('#sRetries').textContent = retries;
  $('#retryTxt').textContent = retries;
  const wait = Math.min(30000, 1200 * Math.pow(1.6, Math.min(retries, 10)));
  showOverlay('Reconectando', reason + '. Reintentando en ' + Math.round(wait/1000) + 's…');
  retryTimer = setTimeout(start, wait);
}

function getUrl() {
  const path = mode === 'vertical' ? channel + '-vertical' : channel;
  return '/live/' + encodeURIComponent(path) + '/index.m3u8';
}

async function start() {
  cleanup();
  const url = getUrl();
  $('#hlsTxt').textContent = mode === 'vertical' ? '9:16' : '16:9';
  showOverlay('Cargando', 'Iniciando stream…');
  const v = $('#video');
  v.muted = true; // siempre muted al inicio — evita bloqueo de autoplay en todos los navegadores

  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = url;
    try {
      await v.play();
      hideOverlay(); setLive(true); startStatsPolling(); showUnmuteBanner();
    } catch {
      showOverlay('Toca para reproducir', 'Presiona el botón para iniciar el stream.');
    }
    v.addEventListener('error', () => scheduleRetry('Error de HLS nativo'), { once:true });
    return;
  }

  if (window.Hls && Hls.isSupported()) {
    hls = new Hls({ lowLatencyMode:true, backBufferLength:30, maxBufferLength:8, maxLiveSyncPlaybackRate:1.3 });
    window._hlsInstance = hls;
    hls.on(Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(url));
    hls.on(Hls.Events.MANIFEST_PARSED, async () => {
      try {
        await v.play();
        hideOverlay(); setLive(true); startStatsPolling(); showUnmuteBanner();
      } catch {
        showOverlay('Toca para reproducir', 'Presiona el botón para iniciar el stream.');
      }
    });
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (d?.fatal) { cleanup(); scheduleRetry(d.type || 'Error fatal'); }
    });
    hls.attachMedia(v);
    return;
  }

  showOverlay('No compatible', 'Este navegador no puede reproducir HLS. Usa Safari en iOS o un navegador moderno.');
}

$('#ovRetry').addEventListener('click', () => { retries = 0; start(); });
$('#video').addEventListener('waiting',  () => setLive(false));
$('#video').addEventListener('playing',  () => { setLive(true); hideOverlay(); startStatsPolling(); showUnmuteBanner(); });

// ── WAKE LOCK — evita que el móvil apague la pantalla durante el stream ──
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
$('#video').addEventListener('playing', requestWakeLock);
$('#video').addEventListener('pause',   releaseWakeLock);
$('#video').addEventListener('ended',   releaseWakeLock);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { releaseWakeLock(); }
  else if (!$('#video').paused) { requestWakeLock(); }
});

// ── DARK/LIGHT THEME ──
(function(){
  const root = document.documentElement;
  const btn  = document.getElementById('themeBtn');
  const saved = localStorage.getItem('corillo-theme') || 'dark';
  root.setAttribute('data-theme', saved);
  if (btn) btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('corillo-theme', next);
  });
})();

// ── CHAT ──
let chatVisible = localStorage.getItem('corillo_chat') === 'visible';

function showChat() {
  chatVisible = true;
  localStorage.setItem('corillo_chat', 'visible');
  $('#content').classList.remove('chat-hidden');
  $('#chatFab').classList.remove('visible');
  $('#chatToggleBtn').classList.add('active');
}

function hideChat() {
  chatVisible = false;
  localStorage.setItem('corillo_chat', 'hidden');
  $('#content').classList.add('chat-hidden');
  $('#chatFab').classList.add('visible');
  $('#chatToggleBtn').classList.remove('active');
}

if (!chatVisible) {
  $('#content').classList.add('chat-hidden');
  $('#chatFab').classList.add('visible');
} else {
  $('#chatToggleBtn').classList.add('active');
}

$('#chatToggleBtn').addEventListener('click', () => chatVisible ? hideChat() : showChat());
$('#chatCloseBtn').addEventListener('click', hideChat);
$('#chatFab').addEventListener('click', showChat);

// ── WEBSOCKET CHAT ──
const WS_BASE = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL  = `${WS_BASE}//${location.host}/chat-api/ws/${channel}`;

let ws = null, wsTimer = null;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addChatMsg(msg) {
  const box = $('#chatMsgs');
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
  const el = document.createElement('div');
  if (msg.type === 'system') {
    el.className = 'chat-msg is-system';
    el.textContent = msg.text;
  } else {
    el.className = 'chat-msg' + (msg.bot ? ' is-bot' : '');
    el.innerHTML = `<span class="msg-user">${escHtml(msg.user)}</span><span class="msg-text">${escHtml(msg.text)}</span>`;
  }
  box.appendChild(el);
  if (atBottom) box.scrollTop = box.scrollHeight;
}

function connectWs() {
  if (ws && ws.readyState < 2) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => clearTimeout(wsTimer);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'welcome') {
        $('#chatYou').textContent = msg.user;
        return;
      }
      addChatMsg(msg);
    } catch {}
  };
  ws.onclose = () => { wsTimer = setTimeout(connectWs, 3000); };
  ws.onerror = () => ws.close();
}

function sendMsg() {
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ text }));
  input.value = '';
}

$('#chatSend').addEventListener('click', sendMsg);
$('#chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

connectWs();

start();
</script>
</body>
