  <meta name="twitter:title" content="CORILLO — Stream Platform">
  <meta name="twitter:description" content="Plataforma de streaming independiente desde Puerto Rico. Sin algoritmos, sin baneos arbitrarios.">
  <meta name="twitter:image" content="https://corillo.live/assets/og-image.png">
  <meta name="twitter:image:alt" content="CORILLO — plataforma de streaming desde Puerto Rico">
  <!-- Favicon -->
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <!-- Theme -->
  <meta name="theme-color" content="#030a0e">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://corillo.live/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18"></script>
  <script src="/assets/streamers.js"></script>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    :root {
      --ink:    #030a0e;
      --surface:#071118;
      --panel:  #0d1c28;
      --border: rgba(0,191,255,.08);
      --bh:     rgba(0,191,255,.2);
      --white:  #e8f6ff;
      --muted:  #3a6070;
      --dim:    #1a3040;
      --accent: #00bfff;
      --live:   #00ff9d;
      --mono:  'Space Mono', monospace;
      --display:'Bebas Neue', cursive;
      --body:  'DM Sans', sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    body{background:var(--ink);color:var(--white);font-family:var(--body);font-size:15px;line-height:1.6;min-height:100vh}

    /* ── NAV ── */
    nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;padding:0 32px;background:rgba(3,10,14,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);gap:24px}
    .nav-logo{display:flex;align-items:center}
    .nav-logo svg{height:36px;width:auto}
    .nav-spacer{flex:1}
    .nav-live{display:none;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--live);background:rgba(0,255,157,.07);border:1px solid rgba(0,255,157,.18);padding:4px 10px 4px 8px;border-radius:999px}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 8px rgba(0,255,157,.6);animation:pulse 1.4s infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    .nav-btn{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:rgba(232,246,255,.4);cursor:pointer;transition:.15s}
    .nav-btn:hover{border-color:var(--bh);color:var(--white)}
    .nav-btn.solid{background:var(--accent);color:#030a0e;border-color:transparent;font-weight:700}
    .nav-btn.solid:hover{opacity:.88;box-shadow:0 0 28px rgba(0,191,255,.45)}
    .nav-menu-btn{display:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;align-items:center;justify-content:center;font-size:.85rem;transition:.15s}
    .nav-menu-btn:hover{border-color:var(--bh);color:var(--white)}

    /* ── LAYOUT ── */
    .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 52px)}

    /* ── SIDEBAR ── */
    aside{border-right:1px solid var(--border);padding:24px 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column}
    aside::-webkit-scrollbar{display:none}
    .aside-section{margin-bottom:8px}
    .aside-label{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);padding:0 20px 10px}
    .channel-row{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;transition:background .15s;position:relative;color:inherit}
    .channel-row:hover{background:rgba(0,191,255,.04)}
    .channel-row.active{background:rgba(0,191,255,.08)}
    .channel-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 8px rgba(0,191,255,.5)}
    .ch-ava{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:15px;color:#000}
    .channel-row.is-live .ch-ava{box-shadow:0 0 0 2px var(--live),0 0 10px rgba(0,255,157,.25)}
    .ch-info{flex:1;min-width:0}
    .ch-name{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
    .ch-status{font-size:11px;color:var(--muted);margin-top:1px}
    .ch-status.live{color:var(--live)}
    .ch-viewers{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
    .live-pip{width:6px;height:6px;border-radius:50%;background:var(--live);flex-shrink:0;box-shadow:0 0 8px rgba(0,255,157,.7)}
    .aside-divider{border:none;border-top:1px solid var(--border);margin:12px 0}
    .aside-footer{margin-top:auto;padding:16px 20px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;line-height:1.8}

    /* ── FEATURED ── */
    main{padding:0;overflow:hidden}
    .featured-wrap{position:relative;background:#000;aspect-ratio:16/6;overflow:hidden;cursor:pointer}

    /* fondo estático */
    .featured-bg{position:absolute;inset:0;background:linear-gradient(135deg,#020b12 0%,#061520 50%,#020d18 100%)}
    .featured-bg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,191,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,191,255,.035) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

    /* glow de color del streamer — dos capas que se alternan */
    .glow-a,.glow-b{position:absolute;inset:0;pointer-events:none;transition:opacity 1.1s ease}
    .glow-b{opacity:0}

    /* letra watermark */
    .featured-letter{position:absolute;right:-10px;bottom:-50px;font-family:var(--display);font-size:min(28rem,44vw);line-height:1;letter-spacing:-8px;color:rgba(255,255,255,.016);pointer-events:none;user-select:none;transition:opacity .5s ease}
    .featured-letter.out{opacity:0}

    /* video */
    .featured-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
    .featured-wrap.playing .featured-video{display:block}
    .featured-wrap.playing .featured-bg{opacity:0}
    .featured-wrap.playing .featured-offline{opacity:0;pointer-events:none}

    /* offline */
    .featured-offline{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
    .featured-offline-icon{width:64px;height:64px;border-radius:50%;border:1px solid rgba(0,191,255,.15);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.4rem}
    .featured-offline p{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}

    /* viewers badge */
    .featured-viewers{position:absolute;top:20px;right:24px;display:none;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;background:rgba(3,10,14,.75);backdrop-filter:blur(8px);border:1px solid var(--border);padding:5px 12px;border-radius:4px;color:rgba(232,246,255,.6)}
    .featured-wrap.playing .featured-viewers{display:flex}

    /* overlay con info */
    .featured-overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 32px 24px;background:linear-gradient(to top,rgba(3,10,14,.97) 0%,transparent 100%);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;opacity:0;transition:opacity .25s;pointer-events:none}
    .featured-wrap:not(.playing) .featured-overlay{opacity:1;pointer-events:all}
    .featured-wrap.playing:hover .featured-overlay{opacity:1;pointer-events:all}

    /* contenido con crossfade */
    #featuredContent{transition:opacity .38s ease,transform .38s ease;display:contents}
    #featuredContent.out{opacity:0;transform:translateY(10px)}

    .featured-live-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--live);color:#030a0e;padding:3px 10px;border-radius:3px;margin-bottom:10px}
    .featured-name{font-family:var(--display);font-size:clamp(2.5rem,5vw,4.5rem);letter-spacing:3px;line-height:.9;color:var(--white)}
    .featured-name span{color:var(--accent);text-shadow:0 0 30px rgba(0,191,255,.4)}
    .featured-sub{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:8px}
    .featured-actions{display:flex;gap:10px;flex-shrink:0;transition:opacity .38s ease,transform .38s ease}
    .featured-actions.out{opacity:0;transform:translateY(10px)}

    /* indicador de rotación */
    .rotate-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);opacity:.5;width:0;transition:none}

    /* ── CONTENT ── */
    .content-section{padding:32px}
    .section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .section-header h2{font-family:var(--display);font-size:1.6rem;letter-spacing:3px;color:var(--white);line-height:1}
    .section-count{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
    .section-line{flex:1;height:1px;background:var(--border)}
    .live-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px}
    .no-live-msg{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:12px;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase}
    .stream-card{border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;display:block;color:inherit}
    .stream-card:hover{transform:translateY(-3px);border-color:rgba(0,191,255,.3);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(0,191,255,.07)}
    .stream-thumb{aspect-ratio:16/9;position:relative;overflow:hidden;background:linear-gradient(135deg,#071118,#0d1c28)}
    .stream-thumb-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .stream-thumb-letter{font-family:var(--display);font-size:3.5rem;letter-spacing:4px;color:rgba(0,191,255,.06)}
    .stream-live-tag{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--live);color:#030a0e;padding:3px 8px;border-radius:3px}
    .stream-viewers{position:absolute;top:8px;right:8px;font-family:var(--mono);font-size:10px;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);color:rgba(232,246,255,.7);padding:3px 8px;border-radius:3px;display:flex;align-items:center;gap:5px}
    .stream-body{padding:12px 14px}
    .stream-name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:3px}
    .stream-desc{font-size:12px;color:var(--muted)}
    .offline-list{display:flex;flex-direction:column;gap:2px}
    .offline-row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:6px;cursor:pointer;transition:background .15s;border:1px solid transparent;color:inherit}
    .offline-row:hover{background:rgba(0,191,255,.03);border-color:var(--border)}
    .offline-ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:16px;color:#000;flex-shrink:0;opacity:.6}
    .offline-info{flex:1;min-width:0}
    .offline-name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;color:rgba(232,246,255,.4)}
    .offline-status{font-size:11px;color:var(--muted);margin-top:1px}
    .offline-action{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--accent);opacity:0;transition:opacity .15s}
    .offline-row:hover .offline-action{opacity:1}

    /* ── DRAWER ── */
    .drawer-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
    .drawer-overlay.open{display:block}
    .drawer{position:fixed;top:0;left:0;bottom:0;z-index:201;width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
    .drawer.open{transform:translateX(0)}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
    .drawer-close{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:.15s}
    .drawer-close:hover{color:var(--white);border-color:var(--bh)}
    .drawer-body{flex:1;overflow-y:auto;scrollbar-width:none;padding:16px 0}
    .drawer-body::-webkit-scrollbar{display:none}
    .nav-link{display:flex;align-items:center;gap:10px;padding:9px 20px;font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:rgba(232,246,255,.55);transition:.15s;border-radius:0}
    .nav-link i{width:14px;text-align:center;font-size:.75rem;color:var(--muted)}
    .nav-link:hover{color:var(--white);background:rgba(0,191,255,.05)}
    .nav-link:hover i{color:var(--accent)}
    .aside-nav{padding:8px 0}
    .sidebar-nav-link{display:flex;align-items:center;gap:10px;padding:8px 20px;font-family:var(--mono);font-size:10px;letter-spacing:.5px;color:rgba(232,246,255,.45);transition:.15s}
    .sidebar-nav-link i{width:12px;text-align:center;font-size:.7rem;color:var(--muted)}
    .sidebar-nav-link:hover{color:var(--white);background:rgba(0,191,255,.04)}
    .sidebar-nav-link:hover i{color:var(--accent)}
    .sidebar-show-all{display:block;width:100%;padding:8px 20px;background:transparent;border:none;color:rgba(232,246,255,.35);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;text-align:left;transition:.15s;gap:8px}
    .sidebar-show-all:hover{color:var(--accent)}

    /* ── RESPONSIVE ── */
    @media(max-width:1100px){.live-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:820px){.layout{grid-template-columns:1fr}aside{display:none}.nav-menu-btn{display:flex}.featured-wrap{aspect-ratio:16/9}}
    @media(max-width:600px){nav{padding:0 16px;gap:12px}.live-grid{grid-template-columns:1fr}.content-section{padding:20px 16px}.featured-overlay{padding:24px 16px 16px}}
  </style>
</head>
<body>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <a href="/" style="display:flex;align-items:center">
      <svg viewBox="0 0 304 88" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:28px;width:auto">
        <defs><radialGradient id="dg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00bfff" stop-opacity="0.18"/><stop offset="100%" stop-color="#00bfff" stop-opacity="0"/></radialGradient></defs>
        <text x="0" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">C</text>
        <circle cx="72" cy="42" r="36" fill="url(#dg)"/>
        <circle cx="72" cy="42" r="34" stroke="#e8f6ff" stroke-width="9" fill="none"/>
        <circle cx="72" cy="42" r="20" stroke="#00bfff" stroke-width="6" fill="none"/>
        <circle cx="72" cy="42" r="8" fill="#00bfff"/>
        <circle cx="72" cy="42" r="3.5" fill="#00ff9d"/>
        <text x="114" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">RILLO</text>
      </svg>
    </a>
    <button class="drawer-close" id="drawerClose"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body">
    <div class="aside-label">Navegar</div>
    <a href="/multiplayer/" class="nav-link"><i class="fa-solid fa-table-cells"></i> Multiplayer</a>
    <a href="/join/" class="nav-link"><i class="fa-solid fa-plus"></i> Crear Canal</a>
    <a href="/perfil/" class="nav-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
    <a href="/configuracion/" class="nav-link"><i class="fa-solid fa-gear"></i> Config OBS</a>

      <div class="aside-label">En vivo</div>
      <div id="drawerLiveRows"></div>

    <div class="aside-label">Canales</div>
    <div id="drawerOfflineRows"></div>
  </div>
</div>

<!-- NAV -->
<nav>
  <button class="nav-menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 304 88" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="ng" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00bfff" stop-opacity="0.18"/><stop offset="100%" stop-color="#00bfff" stop-opacity="0"/></radialGradient></defs>
      <text x="0" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">C</text>
      <circle cx="72" cy="42" r="36" fill="url(#ng)"/>
      <circle cx="72" cy="42" r="34" stroke="#e8f6ff" stroke-width="9" fill="none"/>
      <circle cx="72" cy="42" r="20" stroke="#00bfff" stroke-width="6" fill="none"/>
      <circle cx="72" cy="42" r="8" fill="#00bfff"/>
      <circle cx="72" cy="42" r="3.5" fill="#00ff9d"/>
      <text x="114" y="74" font-family="Bebas Neue, cursive" font-size="82" fill="#e8f6ff">RILLO</text>
    </svg>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-live" id="navLive">
    <span class="live-dot"></span>
    <span id="navLiveCount">0 en vivo</span>
  </div>
  <a href="/join/" class="nav-btn solid">+ Unirse</a>
</nav>

<div class="layout">
  <aside>
    <div class="aside-nav">
      <a href="/multiplayer/" class="sidebar-nav-link"><i class="fa-solid fa-table-cells"></i> Multiplayer</a>
      <a href="/join/" class="sidebar-nav-link"><i class="fa-solid fa-plus"></i> Crear Canal</a>
      <a href="/perfil/" class="sidebar-nav-link"><i class="fa-solid fa-user"></i> Mi Perfil</a>
      <a href="/configuracion/" class="sidebar-nav-link"><i class="fa-solid fa-gear"></i> Config OBS</a>
    </div>
    <hr class="aside-divider">
    <div class="aside-section" id="sidebarLiveSection" style="display:none">
      <div class="aside-label">En vivo</div>
      <div id="sidebarLiveRows"></div>
    </div>
    <hr class="aside-divider" id="sidebarDivider" style="display:none">
    <div class="aside-section">
      <div class="aside-label">Canales</div>
      <div id="sidebarOfflineRows"></div>
      <button class="sidebar-show-all" id="sidebarShowAll" style="display:none"><i class="fa-solid fa-chevron-down"></i> Ver todos</button>
    </div>
    <div class="aside-footer">CORILLO<br>STREAM PLATFORM<br>PUERTO RICO</div>
  </aside>

  <main>
    <div class="featured-wrap" id="featuredWrap">
      <div class="featured-bg"></div>
      <div class="glow-a" id="glowA"></div>
      <div class="glow-b" id="glowB"></div>
      <div class="featured-letter" id="featuredLetter"></div>
      <video class="featured-video" id="featuredVideo" autoplay muted playsinline></video>
      <div class="featured-offline" id="featuredOffline">
        <div class="featured-offline-icon"><i class="fa-solid fa-tower-broadcast"></i></div>
        <p>Sin stream activo</p>
      </div>
      <div class="featured-viewers" id="featuredViewers">
        <i class="fa-solid fa-eye" style="font-size:10px;color:var(--accent)"></i>
        <span id="featuredViewerCount">0</span>
      </div>
      <div class="featured-overlay">
        <div id="featuredContent">
          <div id="featuredInfo"></div>
        </div>
        <div class="featured-actions" id="featuredActions"></div>
      </div>
      <div class="rotate-bar" id="rotateBar"></div>
    </div>

    <div class="content-section">
      <div class="section-header">
        <h2>EN VIVO</h2>
        <span class="section-count" id="liveCount">—</span>
        <div class="section-line"></div>
      </div>
      <div class="live-grid" id="liveGrid"></div>
      <div class="section-header">
        <h2>CANALES</h2>
        <span class="section-count" id="offlineCount">—</span>
        <div class="section-line"></div>
      </div>
      <div class="offline-list" id="offlineList"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
<script src="assets/streamers.js"></script>
<script>
(function () {
  const POLL_MS     = 15000;
  const API_TIMEOUT = 5000;
  const CACHE_MS    = 8000;
  const ROTATE_MS   = 8000;

  let cache       = { t: 0, data: null };
  let hlsInstance = null;
  let featuredKey = null;
  let pollTimer   = null;
  let rotateTimer = null;
  let rafId       = null;
  let rotateStart = null;
  let livePlayers = [];
  let rotateIdx   = 0;
  let lastPaths   = [];
  let glowActive  = 'a'; // which glow layer is currently visible

  /* ── API ── */
  async function fetchPaths() {
    const now = Date.now();
    if (cache.data && now - cache.t < CACHE_MS) return cache.data;
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), API_TIMEOUT);
    try {
      const r = await fetch('/mediamtx-api/v3/paths/list', { signal: ctrl.signal });
      clearTimeout(tid);
      const j = await r.json();
      cache = { t: now, data: j.items || [] };
    } catch {
      clearTimeout(tid);
      if (!cache.data) cache.data = [];
    }
    return cache.data;
  }

  function getLiveSet(paths) {
    const s = new Set();
    for (const p of paths) {
      if (!p.ready) continue;
      const m = p.name.match(/^live\/(.+)$/);
      if (m) s.add(m[1]);
    }
    return s;
  }

  function getViewers(paths, key) {
    const p = paths.find(p => p.name === 'live/' + key);
    return p ? (p.readers?.length ?? 0) : 0;
  }

  /* ── Helpers ── */
  function avaStyle(s)   { return s.color ? `background:${s.color}` : 'background:#1e3a4a' }
  function initial(name) { return name.charAt(0).toUpperCase() }
  function splitName(n)  { return n.length <= 4 ? `<span>${n}</span>` : `${n.slice(0,-3)}<span>${n.slice(-3)}</span>` }

  function hexToRgba(hex, alpha) {
    if (!hex || hex.length < 7) return `rgba(0,191,255,${alpha})`;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  /* ── Glow crossfade ── */
  function setGlow(color) {
    const grad = `radial-gradient(ellipse 70% 90% at 25% 55%, ${hexToRgba(color, .18)}, transparent 65%)`;
    const incoming = glowActive === 'a' ? 'b' : 'a';
    const inEl  = document.getElementById('glow' + incoming.toUpperCase());
    const outEl = document.getElementById('glow' + glowActive.toUpperCase());
    inEl.style.background = grad;
    inEl.style.opacity = '1';
    outEl.style.opacity = '0';
    glowActive = incoming;
  }

  /* ── Progress bar ── */
  function startProgressBar() {
    cancelAnimationFrame(rafId);
    const bar = document.getElementById('rotateBar');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    rotateStart = performance.now();
    function tick(now) {
      const pct = Math.min(100, ((now - rotateStart) / ROTATE_MS) * 100);
      bar.style.width = pct + '%';
      if (pct < 100) rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  /* ── Featured content update (with crossfade) ── */
  function applyFeaturedContent(key, paths) {
    const s = (window.STREAMERS || []).find(x => x.key === key) || { key, name: key.toUpperCase() };
    const viewers = getViewers(paths, key);

    document.getElementById('featuredInfo').innerHTML = `
      <div class="featured-live-tag">
        <span class="live-dot" style="width:5px;height:5px;box-shadow:none"></span>
        En vivo
      </div>
      <div class="featured-name">${splitName(s.name)}</div>
      <div class="featured-sub">${s.sub || 'corillo.live · Puerto Rico'}</div>`;

    document.getElementById('featuredActions').innerHTML = `
      <a href="/${key}/" class="nav-btn solid"><i class="fa-solid fa-play"></i> Ver stream</a>
      ${s.twitch ? `<a href="https://twitch.tv/${s.twitch}" target="_blank" class="nav-btn"><i class="fab fa-twitch"></i> Twitch</a>` : ''}`;

    document.getElementById('featuredViewerCount').textContent = viewers;
    document.getElementById('featuredLetter').textContent = initial(s.name);
    setGlow(s.color);
  }

  function setFeatured(key, paths, animate) {
    const wrap = document.getElementById('featuredWrap');
    const vid  = document.getElementById('featuredVideo');

    if (!key) {
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      vid.src = '';
      wrap.classList.remove('playing');
      featuredKey = null;
      document.getElementById('featuredInfo').innerHTML = '';
      document.getElementById('featuredActions').innerHTML = '';
      document.getElementById('featuredLetter').textContent = '';
      cancelAnimationFrame(rafId);
      document.getElementById('rotateBar').style.width = '0%';
      return;
    }

    // Solo actualizar viewers si no cambió el canal
    if (key === featuredKey) {
      document.getElementById('featuredViewerCount').textContent = getViewers(paths, key);
      return;
    }

    const doSwitch = () => {
      featuredKey = key;
      applyFeaturedContent(key, paths);

      // HLS
      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      const url = `/live/${encodeURIComponent(key)}/index.m3u8`;
      if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = url; vid.play().catch(()=>{});
      } else if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({ lowLatencyMode: true, maxBufferLength: 8 });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(vid);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
      }
      wrap.classList.add('playing');
    };

    if (animate && featuredKey) {
      const content = document.getElementById('featuredContent');
      const actions = document.getElementById('featuredActions');
      const letter  = document.getElementById('featuredLetter');
      content.classList.add('out');
      actions.classList.add('out');
      letter.classList.add('out');
      setTimeout(() => {
        doSwitch();
        content.classList.remove('out');
        actions.classList.remove('out');
        setTimeout(() => letter.classList.remove('out'), 60);
      }, 380);
    } else {
      doSwitch();
    }
  }

  /* ── Auto-rotación ── */
  function startRotation(live) {
    clearInterval(rotateTimer);
    cancelAnimationFrame(rafId);
    livePlayers = live.map(s => s.key);
    if (livePlayers.length <= 1) {
      document.getElementById('rotateBar').style.width = '0%';
      return;
    }
    startProgressBar();
    rotateTimer = setInterval(() => {
      rotateIdx = (rotateIdx + 1) % livePlayers.length;
      const key = livePlayers[rotateIdx];
      setFeatured(key, lastPaths, true);
      updateSidebarActive(key);
      startProgressBar();
    }, ROTATE_MS);
  }

  function resetRotation(newKey) {
    rotateIdx = livePlayers.indexOf(newKey);
    if (rotateIdx < 0) rotateIdx = 0;
    clearInterval(rotateTimer);
    if (livePlayers.length > 1) {
      startProgressBar();
      rotateTimer = setInterval(() => {
        rotateIdx = (rotateIdx + 1) % livePlayers.length;
        const key = livePlayers[rotateIdx];
        setFeatured(key, lastPaths, true);
        updateSidebarActive(key);
        startProgressBar();
      }, ROTATE_MS);
    }
  }

  /* ── Sidebar ── */
  function updateSidebarActive(key) {
    document.querySelectorAll('#sidebarLiveRows .channel-row').forEach(el => {
      el.classList.toggle('active', el.dataset.key === key);
    });
  }

  function renderSidebar(live, offline, paths, activeFeatured) {
    const liveSection = document.getElementById('sidebarLiveSection');
    const liveRows    = document.getElementById('sidebarLiveRows');
    const divider     = document.getElementById('sidebarDivider');
    const offlineRows = document.getElementById('sidebarOfflineRows');

    if (live.length) {
      liveSection.style.display = '';
      divider.style.display     = '';
      liveRows.innerHTML = live.map(s => {
        const viewers = getViewers(paths, s.key);
        const active  = s.key === activeFeatured ? ' active' : '';
        return `<a href="/${s.key}/" class="channel-row is-live${active}" data-key="${s.key}">
          <div class="ch-ava" style="${avaStyle(s)}">${initial(s.name)}</div>
          <div class="ch-info">
            <div class="ch-name"${s.color ? ` style="color:${s.color}"` : ''}>${s.name}</div>
            <div class="ch-status live">En vivo</div>
          </div>
          ${viewers > 0 ? `<div class="ch-viewers">${viewers}</div>` : '<div class="live-pip"></div>'}
        </a>`;
      }).join('');
    } else {
      liveSection.style.display = 'none';
      divider.style.display     = 'none';
    }

    const MAX = 8;
    const showAllBtn = document.getElementById('sidebarShowAll');
    const renderOffline = (list) => list.map(s => `
      <a href="/${s.key}/" class="channel-row">
        <div class="ch-ava" style="${avaStyle(s)};opacity:.45">${initial(s.name)}</div>
        <div class="ch-info">
          <div class="ch-name" style="color:rgba(232,246,255,.35)">${s.name}</div>
          <div class="ch-status">Offline</div>
        </div>
      </a>`).join('');

    if (offline.length > MAX) {
      offlineRows.innerHTML = renderOffline(offline.slice(0, MAX));
      showAllBtn.style.display = '';
      showAllBtn.onclick = () => {
        offlineRows.innerHTML = renderOffline(offline);
        showAllBtn.style.display = 'none';
      };
    } else {
      offlineRows.innerHTML = renderOffline(offline);
      showAllBtn.style.display = 'none';
    }
  }

  // Click en sidebar live → switchea featured
  document.getElementById('sidebarLiveRows').addEventListener('click', e => {
    const row = e.target.closest('[data-key]');
    if (!row) return;
    e.preventDefault();
    const key = row.dataset.key;
    if (key === featuredKey) return;
    setFeatured(key, lastPaths, true);
    updateSidebarActive(key);
    resetRotation(key);
  });

  /* ── Drawer ── */
  function renderDrawer(live, offline, paths) {
    const liveSection = document.getElementById('drawerLiveSection');
    const liveRows    = document.getElementById('drawerLiveRows');
    const offlineRows = document.getElementById('drawerOfflineRows');
    if (live.length) {
      liveSection.style.display = '';
      liveRows.innerHTML = live.map(s => {
        const v = getViewers(paths, s.key);
        return `<a href="/${s.key}/" class="channel-row is-live" onclick="closeDrawer()">
          <div class="ch-ava" style="${avaStyle(s)}">${initial(s.name)}</div>
          <div class="ch-info">
            <div class="ch-name"${s.color ? ` style="color:${s.color}"` : ''}>${s.name}</div>
            <div class="ch-status live">En vivo</div>
          </div>
          ${v > 0 ? `<div class="ch-viewers">${v}</div>` : '<div class="live-pip"></div>'}
        </a>`;
      }).join('');
    } else {
      liveSection.style.display = 'none';
    }
    offlineRows.innerHTML = offline.map(s => `
      <a href="/${s.key}/" class="channel-row" onclick="closeDrawer()">
        <div class="ch-ava" style="${avaStyle(s)};opacity:.45">${initial(s.name)}</div>
        <div class="ch-info">
          <div class="ch-name" style="color:rgba(232,246,255,.35)">${s.name}</div>
          <div class="ch-status">Offline</div>
        </div>
      </a>`).join('');
  }

  function openDrawer()  { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open') }
  window.closeDrawer = () => { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open') };
  document.getElementById('menuBtn').addEventListener('click', openDrawer);
  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);

  /* ── Nav ── */
  function updateNav(count) {
    const el = document.getElementById('navLive');
    el.style.display = count > 0 ? 'flex' : 'none';
    document.getElementById('navLiveCount').textContent = `${count} en vivo`;
  }

  /* ── Grid ── */
  function renderGrid(live, offline, paths) {
    const grid = document.getElementById('liveGrid');
    document.getElementById('liveCount').textContent = live.length
      ? `${live.length} canal${live.length > 1 ? 'es' : ''} activo${live.length > 1 ? 's' : ''}`
      : 'ninguno en vivo';

    if (!live.length) {
      grid.innerHTML = `<div class="no-live-msg"><i class="fa-solid fa-tower-broadcast" style="font-size:1.5rem"></i>Sin streams activos ahora mismo</div>`;
    } else {
      grid.innerHTML = live.map(s => {
        const v = getViewers(paths, s.key);
        return `<a href="/${s.key}/" class="stream-card">
          <div class="stream-thumb">
            <div class="stream-thumb-inner"><span class="stream-thumb-letter">${s.name}</span></div>
            <div class="stream-live-tag"><span class="live-dot" style="width:5px;height:5px;box-shadow:none;animation:none"></span> LIVE</div>
            ${v > 0 ? `<div class="stream-viewers"><i class="fa-solid fa-eye" style="font-size:9px"></i> ${v}</div>` : ''}
          </div>
          <div class="stream-body">
            <div class="stream-name">${s.name}</div>
            <div class="stream-desc">En vivo ahora</div>
          </div>
        </a>`;
      }).join('');
    }

    document.getElementById('offlineCount').textContent = `${offline.length} offline`;
    document.getElementById('offlineList').innerHTML = offline.map(s => `
      <a href="/${s.key}/" class="offline-row">
        <div class="offline-ava" style="${avaStyle(s)}">${initial(s.name)}</div>
        <div class="offline-info">
          <div class="offline-name">${s.name}</div>
          <div class="offline-status">Offline</div>
        </div>
        <div class="offline-action">Ver canal →</div>
      </a>`).join('');
  }

  /* ── Update ── */
  async function update() {
    const paths     = await fetchPaths();
    lastPaths       = paths;
    const liveSet   = getLiveSet(paths);
    const streamers = (window.STREAMERS || []).filter(s => !s.soon);
    const live      = streamers.filter(s =>  liveSet.has(s.key));
    const offline   = streamers.filter(s => !liveSet.has(s.key));
    const preferred = (live.find(s => s.host) || live[0])?.key || null;

    updateNav(live.length);
    renderDrawer(live, offline, paths);
    renderSidebar(live, offline, paths, featuredKey || preferred);
    renderGrid(live, offline, paths);
    setFeatured(preferred, paths, false);
    startRotation(live);
  }

  /* ── Polling ── */
  function startPoll() { clearInterval(pollTimer); pollTimer = setInterval(update, POLL_MS) }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { clearInterval(pollTimer); clearInterval(rotateTimer); cancelAnimationFrame(rafId); }
    else { cache.t = 0; update(); startPoll(); }
  });

  update();
  startPoll();
})();
</script>
</body>
</html>
