name: Deploy to Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          VERSION=$(jq -r '.version' version.json)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          DATE=$(date -u +%Y-%m-%d)
          jq --arg v "$NEW_VERSION" --arg d "$DATE" '.version = $v | .date = $d' version.json > _tmp.json && mv _tmp.json version.json
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='assets/thumbs' \
            --exclude='assets/kick' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/stream/

      - name: Sync nginx.conf and reload nginx if changed
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "if ! diff -q /var/www/stream/nginx.conf /etc/nginx/nginx.conf > /dev/null 2>&1; then
               sudo cp /var/www/stream/nginx.conf /etc/nginx/nginx.conf
               sudo nginx -t && sudo systemctl reload nginx
               echo 'nginx config changed — reloaded'
             else
               echo 'nginx config unchanged — skipped'
             fi"

      - name: Sync mediamtx.yml and restart MediaMTX if changed
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "if ! diff -q /var/www/stream/mediamtx.yml /etc/mediamtx/mediamtx.yml > /dev/null 2>&1; then
               sudo cp /var/www/stream/mediamtx.yml /etc/mediamtx/mediamtx.yml
               sudo systemctl restart mediamtx
               echo 'MediaMTX config changed — restarted'
             else
               echo 'MediaMTX config unchanged — skipped'
             fi"

      - name: Deploy telegram service
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
             mkdir -p /home/corillo-adm/corillo-telegram
             cp /var/www/stream/telegram/server.py /home/corillo-adm/corillo-telegram/server.py
             cp /var/www/stream/telegram/requirements.txt /home/corillo-adm/corillo-telegram/requirements.txt
             if [ ! -d /home/corillo-adm/corillo-telegram/venv ]; then
               python3 -m venv /home/corillo-adm/corillo-telegram/venv
             fi
             /home/corillo-adm/corillo-telegram/venv/bin/pip install -q -r /home/corillo-adm/corillo-telegram/requirements.txt
             if [ ! -f /home/corillo-adm/corillo-telegram/.env ]; then
               cp /home/corillo-adm/corillo-bot/.env /home/corillo-adm/corillo-telegram/.env
             fi
             if [ ! -f /etc/systemd/system/corillo-telegram.service ]; then
               sudo cp /var/www/stream/telegram/corillo-telegram.service /etc/systemd/system/corillo-telegram.service
               sudo systemctl daemon-reload
               sudo systemctl enable corillo-telegram
             fi
             sudo systemctl restart corillo-telegram"

      - name: Deploy api service
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
             mkdir -p /home/corillo-adm/corillo-api
             cp /var/www/stream/api/server.py /home/corillo-adm/corillo-api/server.py
             cp /var/www/stream/api/requirements.txt /home/corillo-adm/corillo-api/requirements.txt
             if [ ! -d /home/corillo-adm/corillo-api/venv ]; then
               python3 -m venv /home/corillo-adm/corillo-api/venv
             fi
             /home/corillo-adm/corillo-api/venv/bin/pip install -q -r /home/corillo-adm/corillo-api/requirements.txt
             if [ ! -f /home/corillo-adm/corillo-api/.env ]; then
               cp /home/corillo-adm/corillo-bot/.env /home/corillo-adm/corillo-api/.env
             fi
             if [ ! -f /etc/systemd/system/corillo-api.service ]; then
               sudo cp /var/www/stream/api/corillo-api.service /etc/systemd/system/corillo-api.service
               sudo systemctl daemon-reload
               sudo systemctl enable corillo-api
             fi
             sudo systemctl restart corillo-api"

      - name: Deploy auth service
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
             mkdir -p /home/corillo-adm/corillo-auth
             cp /var/www/stream/auth/server.py /home/corillo-adm/corillo-auth/server.py
             cp /var/www/stream/auth/requirements.txt /home/corillo-adm/corillo-auth/requirements.txt
             if [ ! -d /home/corillo-adm/corillo-auth/venv ]; then
               python3 -m venv /home/corillo-adm/corillo-auth/venv
             fi
             /home/corillo-adm/corillo-auth/venv/bin/pip install -q -r /home/corillo-adm/corillo-auth/requirements.txt
             if [ ! -f /home/corillo-adm/corillo-auth/.env ]; then
               cp /home/corillo-adm/corillo-bot/.env /home/corillo-adm/corillo-auth/.env
             fi
             if [ ! -f /etc/systemd/system/corillo-auth.service ]; then
               sudo cp /var/www/stream/auth/corillo-auth.service /etc/systemd/system/corillo-auth.service
               sudo systemctl daemon-reload
               sudo systemctl enable corillo-auth
             fi
             sudo systemctl restart corillo-auth"

      - name: Deploy chat bot
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /home/corillo-adm/corillo-bot && \
             cp /var/www/stream/chat/system_prompt.py . && \
             cp /var/www/stream/chat/server.py . && \
             cp /var/www/stream/chat/requirements.txt . && \
             venv/bin/pip install -q -r requirements.txt && \
             sudo systemctl restart corillo-bot"

      - name: Deploy vod-process script
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
             mkdir -p /home/corillo-adm/corillo-vod /var/vods
             cp /var/www/stream/scripts/vod-process.py /home/corillo-adm/corillo-vod/vod-process.py
             cp /var/www/stream/scripts/pb-setup-vods.py /home/corillo-adm/corillo-vod/pb-setup-vods.py
             chmod +x /home/corillo-adm/corillo-vod/vod-process.py
             if [ ! -d /home/corillo-adm/corillo-vod/venv ]; then
               python3 -m venv /home/corillo-adm/corillo-vod/venv
             fi
             /home/corillo-adm/corillo-vod/venv/bin/pip install -q httpx python-dotenv
             if [ ! -f /home/corillo-adm/corillo-vod/.env ]; then
               cp /home/corillo-adm/corillo-bot/.env /home/corillo-adm/corillo-vod/.env
             fi
             /home/corillo-adm/corillo-vod/venv/bin/python /home/corillo-adm/corillo-vod/pb-setup-vods.py
             echo 'vod-process deployed'"

      - name: Deploy bitrate monitor if changed
        run: |
          scp -i ~/.ssh/deploy_key -P 2222 -o StrictHostKeyChecking=no \
            scripts/bitrate-monitor.py \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/bitrate-monitor.py
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "if ! diff -q /tmp/bitrate-monitor.py /home/corillo-adm/bitrate-monitor.py > /dev/null 2>&1; then
               cp /tmp/bitrate-monitor.py /home/corillo-adm/bitrate-monitor.py
               sudo systemctl restart bitrate-monitor
               echo 'bitrate-monitor changed — restarted'
             else
               echo 'bitrate-monitor unchanged — skipped'
             fi"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump to v${{ env.NEW_VERSION }} [skip ci]"
          git pull --rebase origin main
          git push
