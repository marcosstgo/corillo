name: Deploy to Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          VERSION=$(jq -r '.version' version.json)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          DATE=$(date -u +%Y-%m-%d)
          jq --arg v "$NEW_VERSION" --arg d "$DATE" '.version = $v | .date = $d' version.json > _tmp.json && mv _tmp.json version.json
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='assets/thumbs' \
            -e "ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/stream/

      - name: Sync Caddyfile and reload Caddy
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo cp /var/www/stream/Caddyfile /etc/caddy/Caddyfile && sudo systemctl reload caddy && echo 'Caddy reloaded'"

      - name: Deploy chat bot to Pi
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "scp /var/www/stream/chat/system_prompt.py marcos@192.168.8.167:/home/marcos/corillo-bot/system_prompt.py && \
             scp /var/www/stream/chat/server.py marcos@192.168.8.167:/home/marcos/corillo-bot/server.py && \
             scp /var/www/stream/chat/requirements.txt marcos@192.168.8.167:/home/marcos/corillo-bot/requirements.txt && \
             ssh marcos@192.168.8.167 '/home/marcos/corillo-bot/venv/bin/pip install -q -r /home/marcos/corillo-bot/requirements.txt && sudo systemctl restart corillo-bot'"

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump to v${{ env.NEW_VERSION }} [skip ci]"
          git pull --rebase origin main
          git push
