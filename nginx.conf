user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=pb_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=pb_api:10m rate=30r/s;

    # HTTP → HTTPS redirect (todos los dominios)
    server {
        listen 80;
        server_name corillo.live stream.marcossantiago.com marcossantiago.com www.marcossantiago.com vault.marcossantiago.com uptime.corillo.live status.corillo.live pb.corillo.live kioskko.com www.kioskko.com demo.kioskko.com;

        # certbot ACME challenge — no redirigir
        location /.well-known/acme-challenge/ {
            root /var/www/stream;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── CORILLO.LIVE + STREAM.MARCOSSANTIAGO.COM ──
    server {
        listen 443 ssl http2;
        server_name corillo.live stream.marcossantiago.com;

        ssl_certificate     /etc/letsencrypt/live/corillo.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/corillo.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /var/www/stream;

        # HLS → MediaMTX — sin buffer (streaming en tiempo real)
        location ^~ /live/ {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 30s;
        }

        # MediaMTX API
        location ^~ /mediamtx-api/ {
            rewrite ^/mediamtx-api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:9997;
            proxy_set_header Host $host;
        }

        # Twitch API proxy
        location ^~ /twitch-api/ {
            rewrite ^/twitch-api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8880;
            proxy_set_header Host $host;
        }

        # Telegram service — webhook, join, admin
        location ~ ^/chat-api/(telegram-webhook|join|admin) {
            rewrite ^/chat-api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:3003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Streamer API — perfiles públicos, regen stream key, push
        location ~ ^/chat-api/(profile|regen-stream-key|push-config|subscribe|clip) {
            rewrite ^/chat-api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:3004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
        }

        # Chat bot — WebSocket, IA, digest
        location /chat-api/ {
            rewrite ^/chat-api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # WebRTC WHEP
        location ^~ /webrtc/ {
            proxy_pass http://127.0.0.1:8889/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # VOD index page y VOD player — antes que el alias /vods/
        location = /vods/ {
            root /var/www/stream;
            try_files /vods/index.html =404;
        }
        location /vods/v/ {
            root /var/www/stream;
            try_files $uri $uri/index.html =404;
        }

        # VODs — archivos de grabación servidos directamente
        location ^~ /vods/ {
            alias /var/vods/live/;
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin *;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Thumbnails — cache corto (FFmpeg las refresca)
        location /assets/thumbs/ {
            expires 30s;
            add_header Cache-Control "public, max-age=30";
        }

        # Service Worker — sin cache para que el browser detecte updates
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # JS/CSS — cache 1 hora
        location ~* \.(js|css)$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600, stale-while-revalidate=300";
        }

        # Imágenes/iconos estáticos — cache 7 días
        location ~* \.(png|svg|ico|webp)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";
        }

        # manifest.json y version.json — cache 60s
        location ~ ^/(manifest\.json|version\.json)$ {
            expires 60s;
            add_header Cache-Control "public, max-age=60";
        }

        # React demo — Vite + React + hls.js
        location ^~ /react-demo/ {
            alias /var/www/stream/react-demo-dist/;
            try_files $uri $uri/ /react-demo-dist/index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Rechaza rutas tipo archivo usadas como canal ficticio
        location ~ ^/[^/]*\.[^/]+(?:/|$) {
            try_files $uri =404;
        }
        # Canales — captura el key e inyecta en el template via sub_filter
        location ~ ^/([a-z0-9][a-z0-9_]*)(/|$) {
            set $ch $1;
            try_files $uri $uri/index.html @channel;
        }

        location @channel {
            gzip off;
            sub_filter '__CHANNEL__' $ch;
            sub_filter_once off;
            root /var/www/stream;
            rewrite ^ /player/index.html break;
        }

        # Frontend estático — resto de paths
        location / {
            try_files $uri $uri/index.html =404;
        }
    }


    # ── MARCOSSANTIAGO.COM ──
    server {
        listen 443 ssl http2;
        server_name marcossantiago.com www.marcossantiago.com;

        ssl_certificate     /etc/letsencrypt/live/marcossantiago.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/marcossantiago.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location /ms-chat/ {
            rewrite ^/ms-chat/(.*) /$1 break;
            proxy_pass http://127.0.0.1:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ms-blog/ {
            rewrite ^/ms-blog/(.*) /$1 break;
            proxy_pass http://127.0.0.1:3006;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://127.0.0.1:3010;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── PB.CORILLO.LIVE — Pocketbase ──
    server {
        listen 443 ssl http2;
        server_name pb.corillo.live;

        ssl_certificate     /etc/letsencrypt/live/pb.corillo.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pb.corillo.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 10M;

        # Bloquear rutas de scanners y bots — cierra la conexión sin respuesta
        location ~* \.(env|git|svn|htaccess|htpasswd|DS_Store)$ { return 444; }
        location ~* /(wp-config|wp-login|wp-includes|wp-admin|xmlrpc|phpinfo|phpmyadmin|adminer|setup|install|backup|shell|eval) { return 444; }
        location ~* \.(php|asp|aspx|jsp|cgi|pl|py|sh|bash)$ { return 444; }

        # API — rate limit
        location /api/ {
            limit_req zone=pb_api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location / {
            limit_req zone=pb_general burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:8090;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    # ── PB.KIOSKKO.MARCOSSANTIAGO.COM — PocketBase ──
    server {
        listen 443 ssl http2;
        server_name pb.kioskko.marcossantiago.com;

        ssl_certificate     /etc/letsencrypt/live/pb.kioskko.marcossantiago.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pb.kioskko.marcossantiago.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;

        location / {
            proxy_pass http://127.0.0.1:8091;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    # ── KIOSKKO.MARCOSSANTIAGO.COM ──
    server {
        listen 443 ssl http2;
        server_name kioskko.marcossantiago.com;

        ssl_certificate     /etc/letsencrypt/live/kioskko.marcossantiago.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kioskko.marcossantiago.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;

        location / {
            proxy_pass http://127.0.0.1:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── VAULT.MARCOSSANTIAGO.COM ──
    server {
        listen 443 ssl http2;
        server_name vault.marcossantiago.com;

        ssl_certificate     /etc/letsencrypt/live/vault.marcossantiago.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vault.marcossantiago.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://192.168.8.148:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── UPTIME.CORILLO.LIVE ──
    server {
        listen 443 ssl http2;
        server_name uptime.corillo.live;

        ssl_certificate     /etc/letsencrypt/live/uptime.corillo.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/uptime.corillo.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://192.168.8.148:3001;
            proxy_set_header Host $host;
        }
    }

    # ── STATUS.CORILLO.LIVE ──
    server {
        listen 443 ssl http2;
        server_name status.corillo.live;

        ssl_certificate     /etc/letsencrypt/live/status.corillo.live/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/status.corillo.live/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location = / {
            return 302 /status/corillo;
        }
        location / {
            proxy_pass http://192.168.8.148:3001;
            proxy_set_header Host $host;
        }
    }

    # ── KIOSKKO.COM — Landing page ──
    server {
        listen 443 ssl http2;
        server_name kioskko.com www.kioskko.com;

        ssl_certificate     /etc/letsencrypt/live/kioskko.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kioskko.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        root /home/corillo-adm/kioskko/landing;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── DEMO.KIOSKKO.COM — Tienda demo ──
    server {
        listen 443 ssl http2;
        server_name demo.kioskko.com;

        ssl_certificate     /etc/letsencrypt/live/demo.kioskko.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/demo.kioskko.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 20M;

        location / {
            proxy_pass http://127.0.0.1:4321;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

