<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORILLO · Reels</title>
<meta name="description" content="Los mejores momentos de CORILLO — clips 9:16 de los streamers de Puerto Rico.">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<meta name="theme-color" content="#030a0e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/assets/corillo.css">
<script>
  const t = localStorage.getItem('corillo-theme');
  if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
</script>
<style>
  body {
    background: var(--crl-ink);
    color: var(--crl-white);
    font-family: var(--crl-body);
    overflow: hidden;
    height: 100dvh;
  }

  /* ── Nav ── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--crl-gap-md);
    background: linear-gradient(to bottom, rgba(3,10,14,.95), transparent);
    z-index: 100;
  }
  .nav-logo {
    font-family: var(--crl-display);
    font-size: var(--crl-xl);
    letter-spacing: 3px;
    color: var(--crl-white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--crl-accent); }
  .nav-tabs {
    display: flex;
    gap: var(--crl-gap-lg);
    font-family: var(--crl-mono);
    font-size: var(--crl-2xs);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .nav-tab { color: var(--crl-muted); cursor: pointer; transition: color .2s; text-decoration: none; }
  .nav-tab.active { color: var(--crl-white); border-bottom: 2px solid var(--crl-accent); padding-bottom: 2px; }

  /* ── Filter bar ── */
  .filter-bar {
    position: fixed;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    z-index: 90;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 400px;
    width: 100%;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    font-family: var(--crl-mono);
    font-size: var(--crl-2xs);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: var(--crl-r-full);
    border: 1px solid rgba(255,255,255,.15);
    background: rgba(3,10,14,.7);
    backdrop-filter: blur(8px);
    color: var(--crl-muted);
    cursor: pointer;
    transition: .15s;
  }
  .filter-chip.active { background: var(--crl-accent); color: #000; border-color: var(--crl-accent); }
  .filter-chip:hover:not(.active) { color: var(--crl-white); border-color: rgba(255,255,255,.3); }

  /* ── Empty / Loading states ── */
  .state-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--crl-muted);
    font-family: var(--crl-mono);
    font-size: var(--crl-xs);
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 50;
  }
  .state-screen i { font-size: 2rem; opacity: .3; }
  .spinner-ring {
    width: 28px; height: 28px;
    border: 3px solid rgba(0,191,255,.2);
    border-top-color: var(--crl-accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scroll hint ── */
  .scroll-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--crl-mono);
    font-size: var(--crl-2xs);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--crl-muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--crl-gap-xs);
    animation: fadeHint 3s ease forwards;
    z-index: 200;
    pointer-events: none;
  }
  @keyframes fadeHint {
    0%,70% { opacity: .6; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">C<span>O</span>RILLO</a>
  <div class="nav-tabs">
    <a href="/" class="nav-tab">Inicio</a>
    <span class="nav-tab active">Reels</span>
    <a href="/vods/" class="nav-tab">VODs</a>
  </div>
</nav>

<!-- Filter by streamer -->
<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" data-channel="">Todos</button>
</div>

<!-- Loading state -->
<div class="state-screen" id="loadingState">
  <div class="spinner-ring"></div>
  <span>Cargando reels</span>
</div>

<!-- Empty state -->
<div class="state-screen" id="emptyState" style="display:none">
  <i class="fa-solid fa-film"></i>
  <span>No hay reels aún</span>
  <span style="font-size:.65rem;opacity:.6">Los streamers crearán clips desde sus VODs</span>
</div>

<!-- Scroll hint -->
<div class="scroll-hint" id="scrollHint" style="display:none">
  <i class="fa-solid fa-chevron-up"></i>
  Desliza
</div>

<!-- Dots indicadores -->
<div class="crl-reel-dots" id="reelDots"></div>

<!-- Reels container -->
<div class="crl-reels" id="reelsContainer" style="display:none"></div>

<script>
const PB_URL = 'https://pb.corillo.live';

let allReels    = [];
let activeChannel = '';
let observer;

// ── Fetch ──────────────────────────────────────────────────────────
async function loadReels(channel = '') {
  const loading = document.getElementById('loadingState');
  const empty   = document.getElementById('emptyState');
  const container = document.getElementById('reelsContainer');

  container.style.display = 'none';
  container.innerHTML = '';
  empty.style.display = 'none';
  loading.style.display = 'flex';

  try {
    let filter = 'public=true';
    if (channel) filter += ` && channel="${channel}"`;
    const res = await fetch(
      `${PB_URL}/api/collections/reels/records?filter=${encodeURIComponent(filter)}&sort=-date&perPage=20`
    );
    const data = await res.json();
    allReels = data.items || [];
  } catch(e) {
    allReels = [];
  }

  loading.style.display = 'none';

  if (!allReels.length) {
    empty.style.display = 'flex';
    return;
  }

  renderReels(allReels);
}

// ── Render ─────────────────────────────────────────────────────────
function renderReels(reels) {
  const container = document.getElementById('reelsContainer');
  const dots      = document.getElementById('reelDots');
  const hint      = document.getElementById('scrollHint');

  container.innerHTML = '';
  dots.innerHTML = '';

  if (observer) observer.disconnect();

  reels.forEach((r, i) => {
    const videoUrl = `/vods/reels/${r.channel}/${r.filename}`;
    const thumbBg  = r.thumb
      ? `background-image:url('${r.thumb}')`
      : `background:linear-gradient(135deg,var(--crl-surface),var(--crl-panel))`;

    // Avatar letter + color from channel name (deterministic)
    const colors = ['#e8c84a','#00bfff','#ff6b6b','#00ff9d','#ff9f43','#a29bfe','#fd79a8','#6c5ce7'];
    const colorIdx = r.channel.charCodeAt(0) % colors.length;
    const avaColor = colors[colorIdx];
    const avaLetter = (r.channel[0] || '?').toUpperCase();

    const el = document.createElement('div');
    el.className = 'crl-reel';
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="crl-reel-bg" style="${thumbBg}"></div>
      <video class="crl-reel-video" src="${videoUrl}"
        playsinline muted loop preload="none"
        style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;opacity:0;transition:opacity .3s">
      </video>
      <div class="crl-reel-placeholder" id="rpl-${i}">
        <i class="fa-solid fa-play"></i>
        <span>${r.duration ? r.duration + 's' : ''}</span>
      </div>
      <div class="crl-reel-overlay">
        <div class="crl-reel-info">
          <div class="crl-reel-streamer">
            <div class="crl-reel-ava" style="background:linear-gradient(135deg,${avaColor},${avaColor}99)">${avaLetter}</div>
            <span class="crl-reel-name">${r.channel.toUpperCase()}</span>
          </div>
          ${r.title ? `<div class="crl-reel-desc">${esc(r.title)}</div>` : ''}
          <div class="crl-reel-meta">${fmtDate(r.date)}${r.duration ? ' · ' + r.duration + 's' : ''}</div>
        </div>
        <div class="crl-reel-actions">
          <a class="crl-reel-btn" href="${videoUrl}" download title="Descargar">
            <div class="crl-reel-btn-icon"><i class="fa-solid fa-download"></i></div>
            <span>Bajar</span>
          </a>
          <button class="crl-reel-btn" onclick="shareReel('${r.channel}', '${r.filename}')">
            <div class="crl-reel-btn-icon"><i class="fa-solid fa-share-nodes"></i></div>
            <span>Share</span>
          </button>
        </div>
      </div>`;

    // Tap to play/pause
    el.addEventListener('click', (e) => {
      if (e.target.closest('a,button')) return;
      const vid = el.querySelector('video');
      if (!vid) return;
      if (vid.paused) { playReel(el); } else { pauseReel(el); }
    });

    container.appendChild(el);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'crl-reel-dot' + (i === 0 ? ' active' : '');
    dots.appendChild(dot);
  });

  container.style.display = '';
  hint.style.display = reels.length > 1 ? 'flex' : 'none';

  // IntersectionObserver para dots + autoplay
  observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      const idx = parseInt(e.target.dataset.idx);
      const vid = e.target.querySelector('video');
      if (e.isIntersecting) {
        document.querySelectorAll('.crl-reel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        if (vid) playReel(e.target);
      } else {
        if (vid) pauseReel(e.target);
      }
    });
  }, { threshold: 0.6 });

  container.querySelectorAll('.crl-reel').forEach(r => observer.observe(r));
}

function playReel(el) {
  const vid = el.querySelector('video');
  const pl  = el.querySelector('.crl-reel-placeholder');
  if (!vid) return;
  vid.style.opacity = '1';
  if (pl) pl.style.display = 'none';
  vid.play().catch(() => {});
}

function pauseReel(el) {
  const vid = el.querySelector('video');
  const pl  = el.querySelector('.crl-reel-placeholder');
  if (!vid) return;
  vid.pause();
  vid.style.opacity = '0';
  if (pl) pl.style.display = '';
}

// ── Share ──────────────────────────────────────────────────────────
async function shareReel(channel, filename) {
  const url = `${location.origin}/vods/reels/${channel}/${filename}`;
  if (navigator.share) {
    try {
      await navigator.share({ title: `Reel de ${channel.toUpperCase()} en CORILLO`, url });
      return;
    } catch(e) {}
  }
  try {
    await navigator.clipboard.writeText(url);
    alert('¡Link copiado!');
  } catch(e) {}
}

// ── Filter chips ───────────────────────────────────────────────────
async function loadStreamers() {
  try {
    // Get channels that have public reels
    const res = await fetch(
      `${PB_URL}/api/collections/reels/records?filter=public=true&fields=channel&perPage=500`
    );
    const data = await res.json();
    const channels = [...new Set((data.items || []).map(r => r.channel))].sort();
    const bar = document.getElementById('filterBar');
    channels.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.channel = ch;
      btn.textContent = ch.toUpperCase();
      bar.appendChild(btn);
    });
  } catch(e) {}
}

document.getElementById('filterBar').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeChannel = chip.dataset.channel;
  loadReels(activeChannel);
});

// ── Utils ──────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 3600)  return `Hace ${Math.floor(diff/60)}m`;
  if (diff < 86400) return `Hace ${Math.floor(diff/3600)}h`;
  if (diff < 604800)return `Hace ${Math.floor(diff/86400)}d`;
  return d.toLocaleDateString('es-PR', { day:'numeric', month:'short' });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────
loadStreamers();
loadReels();
</script>
</body>
</html>
